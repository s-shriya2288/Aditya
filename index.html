<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Final Master Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; overflow-x: hidden; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 50px rgba(0,0,0,0.02); }
        input { background: #f1f5f9; border-radius: 1rem; padding: 1.1rem; outline: none; width: 100%; font-weight: 600; border: 2px solid transparent; transition: 0.2s; }
        input:focus { border-color: #3b82f6; background: white; }
        .pay-option { border: 2px solid #f1f5f9; border-radius: 1.2rem; padding: 1rem; cursor: pointer; transition: 0.2s; text-align: center; width: 100%; background: white; }
        .pay-option.active { border-color: #2563eb; background: #eff6ff; box-shadow: 0 10px 20px -5px rgba(37, 99, 235, 0.1); }
        .receipt-paper { background: white; width: 100%; max-width: 380px; border-radius: 24px; padding: 40px; position: relative; }
        .balance-text { font-size: clamp(1.2rem, 8vw, 2.5rem); font-weight: 900; italic; word-break: break-all; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div class="glass-card p-10 w-full max-w-[440px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-10 tracking-tighter">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="checkAuth('view-admin')" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold">Banker Console</button>
                <button onclick="checkAuth('view-worker')" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold">Worker Terminal</button>
                <button onclick="nav('view-client-login')" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-auth" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900/10 backdrop-blur-md">
        <div class="glass-card p-10 w-full max-w-[360px] text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4">Security Verification</p>
            <input id="auth-pin" type="password" placeholder="••••" class="text-center text-3xl tracking-[0.6em] mb-6">
            <button onclick="verifyAccess()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">Enter System</button>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen flex flex-col items-center justify-center p-6 bg-emerald-50">
        <div class="glass-card p-10 w-full max-w-[480px]">
            <div id="w-search-box" class="space-y-6 text-center">
                <h2 class="font-black text-emerald-800 uppercase text-xs tracking-widest">Collection Desk</h2>
                <input id="w-phone" placeholder="Enter Mobile Number" class="text-center text-xl py-5 border-none outline-none">
                <button onclick="workerSearch()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">Search Member</button>
            </div>
            
            <div id="w-details" class="hidden space-y-6">
                <div class="text-center">
                    <h3 id="wv-name" class="text-2xl font-black uppercase italic text-slate-900">---</h3>
                    <p id="wv-phone-display" class="text-[10px] font-bold text-slate-400 mt-1">---</p>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 flex justify-between items-center">
                    <span class="text-xs font-black text-slate-400 uppercase">Payable</span>
                    <span id="wv-total" class="text-2xl text-blue-700 font-black italic">₹0</span>
                </div>

                <div class="space-y-3">
                    <label class="text-center">Payment Mode</label>
                    <div class="flex gap-4">
                        <div id="opt-cash" class="pay-option active" onclick="setPayMode('Cash')"><p class="text-lg">💵</p><p class="text-[9px] font-bold uppercase">Cash</p></div>
                        <div id="opt-qr" class="pay-option" onclick="setPayMode('QR Code')"><p class="text-lg">📱</p><p class="text-[9px] font-bold uppercase">QR Code</p></div>
                    </div>
                </div>

                <div id="otp-init-zone">
                    <button onclick="sendWorkerSMS()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">Send Verification OTP to Client</button>
                </div>

                <div id="otp-verify-zone" class="hidden space-y-4">
                    <input id="w-verify-otp" placeholder="0 0 0 0" class="text-center text-3xl tracking-[0.4em] bg-white border-2 border-emerald-200 p-4 rounded-2xl">
                    <button onclick="confirmWorkerPayment()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">Complete Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
        <div id="receipt-to-print" class="receipt-paper text-center">
            <h2 class="text-xl font-black uppercase italic text-blue-900 mb-1">SecureBank India</h2>
            <p id="rec-mode" class="text-[8px] font-black bg-slate-100 px-3 py-1 rounded-full inline-block">PAID VIA ---</p>
            <div class="border-y border-dashed border-slate-200 my-6 py-4 space-y-3">
                <div class="flex justify-between text-[10px] font-bold"><span>Member</span><span id="rec-name">---</span></div>
                <div class="flex justify-between text-[10px] font-bold"><span>Amount Paid</span><span id="rec-amount" class="text-emerald-600">₹0</span></div>
            </div>
            <div class="bg-blue-50 p-4 rounded-2xl mb-4">
                <p class="text-[9px] font-bold text-blue-800 uppercase">Next Due Date</p>
                <p id="rec-next-date" class="text-lg font-black text-blue-900">---</p>
            </div>
            <p class="text-[7px] text-slate-300 uppercase">Digitally Verified: SB-TXN-2026</p>
        </div>
        <div class="fixed bottom-10 flex gap-4">
            <button onclick="downloadPDF()" class="bg-white px-8 py-4 rounded-2xl font-black shadow-xl">Save PDF</button>
            <button onclick="location.reload()" class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-black shadow-xl">Finish</button>
        </div>
    </div>

    <div id="view-client-login" class="hidden min-h-screen flex items-center justify-center p-6 bg-blue-50">
        <div class="glass-card p-12 w-full max-w-[420px] text-center">
            <h2 class="text-2xl font-black mb-8 italic">Passbook Access</h2>
            <div id="c-s1" class="space-y-4">
                <input id="c-phone" placeholder="Mobile Number" class="text-center">
                <button onclick="clientOTP()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-bold">Get Access OTP</button>
            </div>
            <div id="c-s2" class="hidden space-y-6">
                <input id="c-otp-in" maxlength="4" placeholder="••••" class="text-center text-4xl p-4 bg-blue-50 rounded-2xl">
                <button onclick="clientLogin()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-bold">Verify & Login</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let pendingNavId, activeUserDocId, activeUserData, currentOTP, selectedMode = 'Cash';
        const MASTER_PIN = "1234";

        function nav(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function checkAuth(id) { pendingNavId = id; nav('view-auth'); }
        function verifyAccess() {
            if(document.getElementById('auth-pin').value === MASTER_PIN) { nav(pendingNavId); }
            else { alert("PIN Error"); }
        }

        // WORKER FLOW
        async function workerSearch() {
            const phone = document.getElementById('w-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                activeUserData = snap.docs[0].data(); activeUserDocId = snap.docs[0].id;
                document.getElementById('w-search-box').classList.add('hidden');
                document.getElementById('w-details').classList.remove('hidden');
                document.getElementById('wv-name').innerText = activeUserData.name;
                document.getElementById('wv-phone-display').innerText = "+91 " + activeUserData.phone;
                window.workerTotal = activeUserData.denom + (activeUserData.fine || 0) - (activeUserData.rebate || 0);
                document.getElementById('wv-total').innerText = "₹" + window.workerTotal.toLocaleString('en-IN');
            } else { alert("Member not found."); }
        }

        function setPayMode(m) {
            selectedMode = m;
            document.getElementById('opt-cash').classList.toggle('active', m === 'Cash');
            document.getElementById('opt-qr').classList.toggle('active', m === 'QR Code');
        }

        async function sendWorkerSMS() {
            currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
            await db.collection('accounts').doc(activeUserDocId).update({ otp: currentOTP });
            alert(`[SMS SIMULATION] To: ${activeUserData.phone}\nVerification Code: ${currentOTP}\nAmount: ₹${window.workerTotal}`);
            document.getElementById('otp-init-zone').classList.add('hidden');
            document.getElementById('otp-verify-zone').classList.remove('hidden');
        }

        async function confirmWorkerPayment() {
            if(document.getElementById('w-verify-otp').value === currentOTP) {
                const newBal = (activeUserData.balance || 0) + window.workerTotal;
                await db.collection('accounts').doc(activeUserDocId).update({
                    balance: newBal,
                    paid_count: firebase.firestore.FieldValue.increment(1),
                    otp: "0000"
                });
                document.getElementById('rec-name').innerText = activeUserData.name;
                document.getElementById('rec-amount').innerText = "₹" + window.workerTotal.toLocaleString('en-IN');
                document.getElementById('rec-mode').innerText = "PAID VIA " + selectedMode;
                const next = new Date(); next.setMonth(next.getMonth() + 1); next.setDate(7);
                document.getElementById('rec-next-date').innerText = next.toLocaleDateString('en-GB');
                document.getElementById('receipt-modal').classList.remove('hidden');
            } else { alert("Wrong OTP"); }
        }

        async function downloadPDF() {
            const canvas = await html2canvas(document.getElementById('receipt-to-print'), { scale: 3 });
            const pdf = new jspdf.jsPDF('p', 'mm', [100, 150]);
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, 100, 150);
            pdf.save(`Receipt_${activeUserData.name}.pdf`);
        }

        // CLIENT LOGIN
        async function clientOTP() {
            const snap = await db.collection('accounts').where('phone', '==', document.getElementById('c-phone').value).get();
            if(!snap.empty) {
                activeUserDocId = snap.docs[0].id;
                currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
                await db.collection('accounts').doc(activeUserDocId).update({ otp: currentOTP });
                alert("ACCESS OTP: " + currentOTP);
                document.getElementById('c-s1').classList.add('hidden');
                document.getElementById('c-s2').classList.remove('hidden');
            }
        }

        async function clientLogin() {
            if(document.getElementById('c-otp-in').value === currentOTP) {
                alert("Client Access Granted");
                location.reload();
            }
        }
    </script>
</body>
</html>
