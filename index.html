<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | RD Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .sidebar-shadow { box-shadow: 0 10px 40px rgba(0,0,0,0.04); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="view-selector" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-extrabold text-blue-900 italic mb-1">SecureBank India</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-10">RD Control Terminal</p>
            <div class="space-y-4">
                <button onclick="showAuthModal('admin')" class="w-full bg-[#1e293b] text-white py-5 rounded-2xl font-bold shadow-lg hover:scale-105 transition">Admin (Banker)</button>
                <button onclick="showAuthModal('worker')" class="w-full bg-[#3d7a5d] text-white py-5 rounded-2xl font-bold shadow-lg hover:scale-105 transition">Worker (Field)</button>
                <button onclick="showAuthModal('client')" class="w-full bg-[#3b82f6] text-white py-5 rounded-2xl font-bold shadow-lg hover:scale-105 transition">Client (Passbook)</button>
            </div>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center p-4 z-[100]">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl relative">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-300 font-bold">✕</button>
            <h2 id="modal-title" class="text-2xl font-black mb-6 text-slate-800 uppercase italic">Gate</h2>
            <div id="email-box" class="space-y-4 hidden">
                <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <button onclick="handleEmailAuth()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Login</button>
                <button id="reg-btn" onclick="handleEmailAuth(true)" class="w-full text-blue-500 font-bold text-xs uppercase mt-2">Register Admin</button>
            </div>
            <div id="phone-box" class="space-y-4 hidden">
                <input id="phone" type="text" placeholder="+91..." class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <div id="recaptcha-container"></div>
                <button id="otp-btn" onclick="sendOTP()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Send OTP</button>
                <input id="otp-input" type="text" placeholder="6-digit OTP" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none hidden">
                <button id="verify-btn" onclick="verifyOTP()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold hidden">Verify</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 bg-white p-8 rounded-[2.5rem] sidebar-shadow h-fit">
                <h3 class="text-[10px] font-black text-slate-300 uppercase mb-8">New RD Registration</h3>
                <div class="space-y-4">
                    <input id="r-acc" placeholder="Account Number" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                    <input id="r-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                    <input id="r-phone" placeholder="Phone (+91...)" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                    <input id="r-denom" oninput="updateLiveTotal()" type="number" placeholder="RD Denomination (₹)" class="w-full p-4 bg-slate-50 rounded-2xl border-none">
                    <div class="flex gap-2">
                        <input id="r-rebate" oninput="updateLiveTotal()" placeholder="Rebate" class="w-1/2 p-4 bg-emerald-50 text-emerald-600 rounded-2xl border-none">
                        <input id="r-fine" oninput="updateLiveTotal()" placeholder="Fine" class="w-1/2 p-4 bg-red-50 text-red-600 rounded-2xl border-none">
                    </div>
                    <div class="bg-[#0f172a] p-6 rounded-3xl text-center text-white">
                        <p class="text-[10px] opacity-40 uppercase">Initial Collection</p>
                        <h2 id="live-total" class="text-3xl font-black">₹0</h2>
                    </div>
                    <button onclick="createRD()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-xl">Create RD & Link</button>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black italic">Active RDs</h2>
                    <button onclick="logout()" class="text-xs font-bold text-red-400 bg-red-50 px-4 py-2 rounded-full">LOGOUT</button>
                </div>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen bg-[#f0f9f4] p-8">
        <div class="max-w-md mx-auto">
            <h2 class="text-center font-black italic text-emerald-900 mb-10 text-2xl">Field Terminal</h2>
            <div id="worker-list" class="space-y-6"></div>
            <button onclick="logout()" class="w-full mt-10 text-emerald-600 font-bold opacity-50 uppercase text-xs">Exit Terminal</button>
        </div>
    </div>

    <div id="view-client" class="hidden min-h-screen p-6 max-w-md mx-auto">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-900 text-white p-10 rounded-[3rem] shadow-2xl mb-8">
            <h2 id="c-name" class="text-xl font-bold mb-1 uppercase tracking-tight">---</h2>
            <p id="c-balance" class="text-5xl font-black italic mb-8">₹0.00</p>
            <div class="grid grid-cols-2 gap-4 text-[10px] font-bold opacity-60 uppercase">
                <div><p>Status</p><p id="c-status">Active</p></div>
                <div><p>Account</p><p id="c-acc">---</p></div>
            </div>
        </div>
        <button onclick="logout()" class="w-full py-4 text-slate-400 font-bold uppercase text-xs">Close Passbook</button>
    </div>

    <script>
        // CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            messagingSenderId: "293213633601",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let targetRole = '';
        let confirmOTP;

        // AUTH UI LOGIC
        function showAuthModal(role) {
            targetRole = role;
            document.getElementById('auth-modal').classList.remove('hidden');
            if(role === 'client') {
                document.getElementById('phone-box').classList.remove('hidden');
                document.getElementById('email-box').classList.add('hidden');
            } else {
                document.getElementById('email-box').classList.remove('hidden');
                document.getElementById('phone-box').classList.add('hidden');
                document.getElementById('reg-btn').classList.toggle('hidden', role !== 'admin');
            }
        }

        async function handleEmailAuth(isReg = false) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(isReg) {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(res.user.uid).set({ role: 'admin' });
                } else {
                    const res = await auth.signInWithEmailAndPassword(e, p);
                    const doc = await db.collection('users').doc(res.user.uid).get();
                    if(doc.data().role !== targetRole) { alert("Wrong Portal Access!"); logout(); }
                }
            } catch (err) { alert(err.message); }
        }

        function sendOTP() {
            const num = document.getElementById('phone').value;
            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
            auth.signInWithPhoneNumber(num, appVerifier).then(res => {
                confirmOTP = res;
                document.getElementById('otp-input').classList.remove('hidden');
                document.getElementById('verify-btn').classList.remove('hidden');
                document.getElementById('otp-btn').classList.add('hidden');
            });
        }

        function verifyOTP() {
            confirmOTP.confirm(document.getElementById('otp-input').value).catch(e => alert("Invalid OTP"));
        }

        // ROLE-BASED VIEW ENGINE
        auth.onAuthStateChanged(async user => {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            if(user) {
                closeModal();
                const doc = await db.collection('users').doc(user.uid).get();
                const role = doc.exists ? doc.data().role : 'client';
                if(role === 'admin') { document.getElementById('view-admin').classList.remove('hidden'); loadAdmin(); }
                else if(role === 'worker') { document.getElementById('view-worker').classList.remove('hidden'); loadWorker(); }
                else { document.getElementById('view-client').classList.remove('hidden'); loadClient(user.phoneNumber); }
            } else { document.getElementById('view-selector').classList.remove('hidden'); }
        });

        // LIVE CALCULATOR
        function updateLiveTotal() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            document.getElementById('live-total').innerText = "₹" + (d - r + f);
        }

        // DATABASE OPERATIONS
        async function createRD() {
            const denom = parseFloat(document.getElementById('r-denom').value) || 0;
            const rebate = parseFloat(document.getElementById('r-rebate').value) || 0;
            const fine = parseFloat(document.getElementById('r-fine').value) || 0;
            
            const data = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-phone').value,
                denom: denom,
                rebate: rebate,
                fine: fine,
                balance: (denom - rebate + fine), // This is the dynamic amount!
                status: "Active",
                date: new Date()
            };

            if(!data.acc || !data.name || !data.phone || denom === 0) return alert("Please fill all fields!");
            
            await db.collection('accounts').add(data);
            alert("RD Profile Created Successfully!");
            document.querySelectorAll('input').forEach(i => i.value = '');
            updateLiveTotal();
        }

        function loadAdmin() {
            db.collection('accounts').orderBy('date', 'desc').onSnapshot(snap => {
                document.getElementById('admin-list').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm flex justify-between items-center border border-slate-50">
                        <div><p class="font-black uppercase text-slate-700">${d.name}</p><p class="text-[10px] text-slate-400">ACC: ${d.acc} | ${d.phone}</p></div>
                        <div class="text-right"><h2 class="text-2xl font-black text-blue-700">₹${d.balance.toLocaleString()}</h2></div>
                    </div>`;
                }).join('');
            });
        }

        function loadWorker() {
            db.collection('accounts').onSnapshot(snap => {
                document.getElementById('worker-list').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                    <div class="bg-white p-10 rounded-[3rem] shadow-lg text-center border-t-8 border-emerald-500">
                        <h4 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">${d.name}</h4>
                        <div class="bg-emerald-50 p-6 rounded-3xl mb-6">
                            <p class="text-[10px] text-emerald-600 font-black mb-1 uppercase tracking-widest">To Collect</p>
                            <h2 class="text-4xl font-black text-emerald-800 italic">₹${d.denom}</h2>
                        </div>
                        <button class="w-full bg-[#3d7a5d] text-white py-5 rounded-2xl font-black shadow-lg">COLLECT PAYMENT</button>
                    </div>`;
                }).join('');
            });
        }

        function loadClient(phone) {
            db.collection('accounts').where('phone', '==', phone).onSnapshot(snap => {
                if(!snap.empty) {
                    const d = snap.docs[0].data();
                    document.getElementById('c-name').innerText = d.name;
                    document.getElementById('c-balance').innerText = "₹" + d.balance.toLocaleString();
                    document.getElementById('c-acc').innerText = d.acc;
                }
            });
        }

        function logout() { auth.signOut(); }
        function closeModal() { document.getElementById('auth-modal').classList.add('hidden'); }
    </script>
</body>
</html>
