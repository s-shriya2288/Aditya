<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden { display: none !important; }
        .active-view { display: block !important; }
        .card-blue { background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); border-radius: 3rem; color: white; padding: 3rem; }
    </style>
</head>
<body>

    <div id="view-selector" class="active-view min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md text-center border border-slate-100">
            <h1 class="text-3xl font-black text-blue-900 italic mb-1">SecureBank India</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Terminal Select</p>
            <div class="space-y-4">
                <button onclick="switchView('view-admin')" class="w-full bg-slate-900 text-white py-6 rounded-2xl font-bold hover:scale-105 transition">Admin Console</button>
                <button onclick="switchView('view-worker')" class="w-full bg-emerald-700 text-white py-6 rounded-2xl font-bold hover:scale-105 transition">Worker Terminal</button>
                <button onclick="switchView('view-client')" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-bold hover:scale-105 transition">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-6xl mx-auto">
            <button onclick="switchView('view-selector')" class="mb-6 text-slate-400 font-bold uppercase text-xs">← Back</button>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-sm">
                    <h2 class="font-black text-xl mb-6">Register Account</h2>
                    <div class="space-y-4">
                        <input id="r-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <input id="r-phone" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                        <div class="flex gap-4">
                            <input id="r-denom" type="number" placeholder="Denom" class="w-1/2 p-4 bg-slate-50 rounded-xl outline-none">
                            <input id="r-years" type="number" placeholder="Years" class="w-1/2 p-4 bg-slate-50 rounded-xl outline-none">
                        </div>
                        <button onclick="saveRD()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Save Account</button>
                    </div>
                </div>
                <div id="admin-list" class="space-y-4">
                    </div>
            </div>
        </div>
    </div>

    <div id="view-client" class="hidden min-h-screen p-6">
        <div class="max-w-xl mx-auto">
            <button onclick="switchView('view-selector')" class="mb-6 text-slate-400 font-bold uppercase text-xs">← Close Passbook</button>
            <div class="card-blue shadow-2xl mb-8">
                <p class="text-xs font-bold opacity-60 uppercase mb-2">Current Balance</p>
                <h1 id="c-balance" class="text-6xl font-black italic mb-10">₹0</h1>
                <div class="flex justify-between border-t border-white/10 pt-6">
                    <div>
                        <p class="text-[10px] opacity-50 uppercase font-bold">Instalments</p>
                        <p id="c-count" class="font-bold text-lg">0/0</p>
                    </div>
                    <div class="text-right">
                        <p class="text-[10px] opacity-50 uppercase font-bold">Status</p>
                        <p class="font-bold text-lg">ACTIVE</p>
                    </div>
                </div>
            </div>
            <div id="client-timeline" class="bg-white p-8 rounded-[3rem] shadow-sm">
                </div>
        </div>
    </div>

    <script>
        // NAVIGATION (This works even if Firebase fails)
        function switchView(viewId) {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            document.getElementById(viewId).classList.remove('hidden');
            if(viewId === 'view-admin') loadList();
        }

        // FIREBASE SETUP
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
            console.log("Firebase Connected!");
        } catch(e) {
            console.error("Firebase Connection Failed:", e);
        }

        async function saveRD() {
            const data = {
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-phone').value,
                balance: parseFloat(document.getElementById('r-denom').value),
                paid_count: 1,
                years: parseInt(document.getElementById('r-years').value),
                created_at: new Date()
            };
            await db.collection('accounts').add(data);
            alert("Success!");
            loadList();
        }

        function loadList() {
            db.collection('accounts').onSnapshot(snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `
                        <div class="bg-white p-6 rounded-2xl flex justify-between items-center shadow-sm">
                            <div>
                                <h4 class="font-bold">${d.name}</h4>
                                <p class="text-[10px] text-slate-400 font-bold">${d.phone}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-xl font-black text-blue-600 italic">₹${d.balance}</p>
                                <button onclick="deleteAcc('${doc.id}')" class="text-[10px] text-red-400 font-bold uppercase mt-1">Delete</button>
                            </div>
                        </div>`;
                });
            });
        }

        async function deleteAcc(id) {
            if(confirm("Delete this account?")) {
                await db.collection('accounts').doc(id).delete();
            }
        }
    </script>
</body>
</html>
