<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | RD Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f4f7fa; color: #1e293b; }
        .glass { background: white; border-radius: 2rem; box-shadow: 0 15px 35px rgba(0,0,0,0.03); }
        .hidden { display: none !important; }
        .btn-shadow { box-shadow: 0 10px 20px -5px rgba(59, 130, 246, 0.4); }
    </style>
</head>
<body>

    <div id="view-selector" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-12 rounded-[3rem] shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-extrabold text-[#1e3a8a] italic mb-1">SecureBank India</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-10">RD Control Terminal</p>
            <div class="space-y-4">
                <button onclick="openGate('admin')" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold hover:scale-105 transition">Admin (Banker)</button>
                <button onclick="openGate('worker')" class="w-full bg-[#3d7a5d] text-white py-5 rounded-2xl font-bold hover:scale-105 transition">Worker (Field)</button>
                <button onclick="openGate('client')" class="w-full bg-[#3b82f6] text-white py-5 rounded-2xl font-bold hover:scale-105 transition">Client (Passbook)</button>
            </div>
        </div>
    </div>

    <div id="view-gate" class="hidden min-h-screen flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md shadow-2xl relative">
            <h2 id="gate-title" class="text-2xl font-black mb-8 italic uppercase text-slate-800">Gate</h2>
            
            <div id="email-section" class="hidden space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <button onclick="loginEmail()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Sign In</button>
            </div>

            <div id="phone-section" class="hidden space-y-4">
                <input id="phone" type="text" placeholder="+91 00000 00000" class="w-full p-4 bg-slate-50 rounded-2xl border-none outline-none">
                <div id="recaptcha-container" class="my-4"></div>
                <button id="send-otp" onclick="sendOTP()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Send OTP</button>
                <input id="otp-input" type="text" placeholder="Enter OTP" class="hidden w-full p-4 bg-slate-50 rounded-2xl outline-none mt-4">
                <button id="verify-otp" onclick="verifyOTP()" class="hidden w-full bg-emerald-600 text-white py-5 rounded-2xl font-bold mt-2">Verify</button>
            </div>
            <button onclick="location.reload()" class="w-full mt-6 text-[10px] font-bold text-slate-300 uppercase">Back</button>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-7xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 bg-white p-10 rounded-[2.5rem] shadow-sm h-fit">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-8">New RD Registration</p>
                <div class="space-y-4">
                    <input id="r-acc" placeholder="Account Number" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                    <input id="r-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                    <input id="r-phone" placeholder="Phone (+91...)" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                    <input id="r-denom" oninput="liveCalc()" type="number" placeholder="RD Denomination (₹)" class="w-full p-4 bg-slate-50 rounded-xl outline-none">
                    <div class="flex gap-2">
                        <input id="r-rebate" oninput="liveCalc()" placeholder="Rebate" class="w-1/2 p-4 bg-emerald-50 text-emerald-600 rounded-xl outline-none">
                        <input id="r-fine" oninput="liveCalc()" placeholder="Fine" class="w-1/2 p-4 bg-red-50 text-red-600 rounded-xl outline-none">
                    </div>
                    <div class="bg-[#0f172a] p-6 rounded-[1.5rem] text-center text-white">
                        <p class="text-[9px] opacity-40 uppercase mb-1">Total Collection</p>
                        <h2 id="total-text" class="text-3xl font-black">₹0</h2>
                    </div>
                    <button onclick="saveRD()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold btn-shadow">Create RD & Link</button>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="bg-white p-4 rounded-3xl mb-8 flex items-center shadow-sm">
                    <span class="px-4 text-slate-400">🔍</span>
                    <input id="search" oninput="filterClients()" placeholder="Search clients..." class="w-full p-2 outline-none text-slate-600">
                </div>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen bg-[#f0fdf4] p-8">
        <h2 class="text-center font-black italic text-emerald-900 mb-10 text-2xl uppercase">Field Terminal</h2>
        <div id="worker-list" class="max-w-md mx-auto space-y-8"></div>
    </div>

    <div id="view-client" class="hidden min-h-screen p-6 flex flex-col items-center justify-center">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-800 text-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md text-center">
            <h2 id="c-name" class="text-xl font-bold mb-1 uppercase tracking-tight">---</h2>
            <p id="c-balance" class="text-6xl font-black italic mb-10">₹0.00</p>
            <div class="flex justify-between text-[10px] font-bold opacity-60 uppercase">
                <div class="text-left"><p>Status</p><p id="c-status" class="text-white opacity-100">ACTIVE</p></div>
                <div class="text-right"><p>Account</p><p id="c-acc" class="text-white opacity-100">---</p></div>
            </div>
        </div>
        <button onclick="logout()" class="mt-10 text-slate-400 font-bold uppercase text-[10px] tracking-widest">Close Passbook</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            messagingSenderId: "293213633601",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        let currentRole = '';
        let confirmResult;

        // NAVIGATION & AUTH
        function openGate(role) {
            currentRole = role;
            document.getElementById('view-selector').classList.add('hidden');
            document.getElementById('view-gate').classList.remove('hidden');
            if(role === 'client') {
                document.getElementById('phone-section').classList.remove('hidden');
            } else {
                document.getElementById('email-section').classList.remove('hidden');
            }
        }

        async function loginEmail() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                const res = await auth.signInWithEmailAndPassword(e, p);
                const userDoc = await db.collection('users').doc(res.user.uid).get();
                if(!userDoc.exists || userDoc.data().role !== currentRole) {
                    alert("Unauthorized access!");
                    logout();
                }
            } catch (err) { alert(err.message); }
        }

        function sendOTP() {
            const phone = document.getElementById('phone').value;
            const verifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
            auth.signInWithPhoneNumber(phone, verifier).then(res => {
                confirmResult = res;
                document.getElementById('otp-input').classList.remove('hidden');
                document.getElementById('verify-otp').classList.remove('hidden');
                document.getElementById('send-otp').classList.add('hidden');
            }).catch(e => alert(e.message));
        }

        function verifyOTP() {
            confirmResult.confirm(document.getElementById('otp-input').value).catch(e => alert("OTP Incorrect"));
        }

        // AUTO-REDIRECTION (MEMORY)
        auth.onAuthStateChanged(async user => {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            if(user) {
                const doc = await db.collection('users').doc(user.uid).get();
                const role = doc.exists ? doc.data().role : 'client';
                if(role === 'admin') { document.getElementById('view-admin').classList.remove('hidden'); loadAdmin(); }
                else if(role === 'worker') { document.getElementById('view-worker').classList.remove('hidden'); loadWorker(); }
                else { document.getElementById('view-client').classList.remove('hidden'); loadClient(user.phoneNumber); }
            } else {
                document.getElementById('view-selector').classList.remove('hidden');
            }
        });

        // ADMIN LOGIC
        function liveCalc() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            document.getElementById('total-text').innerText = "₹" + (d - r + f).toLocaleString();
        }

        async function saveRD() {
            const denom = parseFloat(document.getElementById('r-denom').value) || 0;
            const data = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-phone').value.replace(/\s/g, ''), // Remove spaces for better matching
                balance: denom,
                date: new Date(),
                otp: Math.floor(1000 + Math.random() * 9000)
            };
            if(!data.phone.startsWith('+91')) return alert("Phone must start with +91");
            await db.collection('accounts').add(data);
            alert("Client Linked!");
            location.reload();
        }

        function loadAdmin() {
            db.collection('accounts').orderBy('date', 'desc').onSnapshot(snap => {
                document.getElementById('admin-list').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                    <div class="bg-white p-8 rounded-[2rem] flex justify-between items-center shadow-sm border border-slate-50">
                        <div><p class="font-black text-slate-800">${d.name}</p><p class="text-[10px] text-slate-400">ACC: ${d.acc} | ${d.phone}</p></div>
                        <h2 class="text-3xl font-black text-blue-600">₹${d.balance.toLocaleString()}</h2>
                    </div>`;
                }).join('');
            });
        }

        // CLIENT LINKING (THE FIX)
        function loadClient(phone) {
            db.collection('accounts').where('phone', '==', phone).onSnapshot(snap => {
                if(!snap.empty) {
                    const d = snap.docs[0].data();
                    document.getElementById('c-name').innerText = d.name;
                    document.getElementById('c-balance').innerText = "₹" + d.balance.toLocaleString();
                    document.getElementById('c-acc').innerText = d.acc;
                } else {
                    alert("No account linked to " + phone);
                }
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
