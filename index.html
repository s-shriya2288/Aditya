<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | RD Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; margin: 0; }
        .hidden { display: none !important; }
        .centered-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; width: 100vw; }
        .glass-box { background: white; border-radius: 3rem; padding: 3rem; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .passbook-blue { background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); border-radius: 2.5rem; color: white; padding: 3rem; width: 100%; max-width: 480px; box-shadow: 0 20px 40px rgba(37, 99, 235, 0.2); text-align: left; }
        .ledger-row { background: white; border-radius: 1.5rem; padding: 1.5rem 2rem; display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; border: 1px solid #eef2f6; }
    </style>
</head>
<body>

    <div id="view-selector" class="centered-screen">
        <div class="glass-box">
            <h1 class="text-3xl font-black text-blue-900 italic mb-2 tracking-tighter">SecureBank India</h1>
            <p class="text-[10px] font-bold text-slate-300 uppercase tracking-[0.4em] mb-10">Terminal Select</p>
            <div class="flex flex-col gap-4">
                <button onclick="nav('view-admin')" class="w-full bg-[#0f172a] text-white py-6 rounded-2xl font-bold text-lg hover:opacity-90 transition">Admin Console</button>
                <button onclick="nav('view-worker')" class="w-full bg-[#3d7a5d] text-white py-6 rounded-2xl font-bold text-lg hover:opacity-90 transition">Worker Terminal</button>
                <button onclick="nav('view-client')" class="w-full bg-blue-600 text-white py-6 rounded-2xl font-bold text-lg shadow-lg hover:opacity-90 transition">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8 lg:p-12">
        <div class="max-w-[1400px] mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h1 class="text-3xl font-black italic text-slate-800">Banker Console</h1>
                <button onclick="nav('view-selector')" class="bg-slate-200 text-slate-600 px-6 py-2 rounded-xl font-bold text-xs uppercase">Exit</button>
            </div>
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 bg-white p-8 rounded-[3rem] shadow-sm h-fit">
                    <p class="text-[10px] font-black text-slate-300 uppercase mb-8 tracking-widest">New RD Registration</p>
                    <div class="space-y-4">
                        <input id="r-acc" placeholder="Account Number" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                        <input id="r-name" placeholder="Full Name" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                        <input id="r-phone" placeholder="Phone (+91)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                        <div class="flex gap-4">
                            <input id="r-denom" type="number" placeholder="Denom" class="w-1/2 p-5 bg-slate-50 rounded-2xl outline-none">
                            <input id="r-years" type="number" placeholder="Years" class="w-1/2 p-5 bg-slate-50 rounded-2xl outline-none">
                        </div>
                        <button onclick="saveRD()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-bold text-lg shadow-xl shadow-blue-100 mt-4">Create Account</button>
                    </div>
                </div>
                <div id="admin-ledger" class="lg:col-span-8">
                    <p class="text-slate-400 italic">Connecting to secure ledger...</p>
                </div>
            </div>
        </div>
    </div>

    <div id="view-client" class="hidden centered-screen flex-col bg-white">
        <h2 class="text-slate-800 font-black italic text-2xl mb-10 uppercase tracking-tighter">My RD Passbook</h2>
        <div class="passbook-blue relative overflow-hidden mb-10">
            <p class="text-[10px] font-bold opacity-50 uppercase tracking-[0.2em] mb-2">Total Savings</p>
            <h1 id="c-balance" class="text-6xl font-black italic mb-10 tracking-tighter">₹0</h1>
            <div class="flex justify-between border-t border-white/10 pt-8">
                <div>
                    <p class="text-[10px] font-bold opacity-40 uppercase">Status</p>
                    <p class="font-bold text-lg">ACTIVE</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] font-bold opacity-40 uppercase">Account</p>
                    <p id="c-acc-num" class="font-bold text-lg">---</p>
                </div>
            </div>
        </div>
        <button onclick="nav('view-selector')" class="text-slate-300 font-bold uppercase text-[10px] tracking-widest">Close Passbook</button>
    </div>

    <script>
        // --- 1. THE NAVIGATION ENGINE (Un-freezable) ---
        function nav(id) {
            // Hide everything first
            document.getElementById('view-selector').classList.add('hidden');
            document.getElementById('view-admin').classList.add('hidden');
            document.getElementById('view-client').classList.add('hidden');
            
            // Show the target screen
            const target = document.getElementById(id);
            if(target) {
                target.classList.remove('hidden');
                console.log("Navigated to:", id);
            }

            // Trigger data load ONLY if on admin page
            if(id === 'view-admin') {
                setTimeout(loadLedger, 100); 
            }
        }

        // --- 2. FIREBASE SETUP ---
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };

        try {
            firebase.initializeApp(firebaseConfig);
            var db = firebase.firestore();
        } catch (err) {
            console.error("Firebase init failed:", err);
        }

        // --- 3. DATABASE FUNCTIONS ---
        async function saveRD() {
            try {
                const data = {
                    acc: document.getElementById('r-acc').value,
                    name: document.getElementById('r-name').value.toUpperCase(),
                    phone: document.getElementById('r-phone').value,
                    balance: parseFloat(document.getElementById('r-denom').value),
                    paid_count: 1,
                    years: document.getElementById('r-years').value,
                    created_at: new Date()
                };
                await db.collection('accounts').add(data);
                alert("RD Account Saved!");
                loadLedger(); // Refresh list
            } catch (e) {
                alert("Permission Denied: Wait 1 minute for Firebase Rules to update, then try again.");
            }
        }

        function loadLedger() {
            const container = document.getElementById('admin-ledger');
            
            db.collection('accounts').orderBy('created_at', 'desc').onSnapshot(snap => {
                container.innerHTML = '';
                if(snap.empty) {
                    container.innerHTML = '<div class="bg-white p-10 rounded-3xl text-slate-400 italic">No accounts found. Create one to start.</div>';
                    return;
                }
                snap.forEach(doc => {
                    const d = doc.data();
                    container.innerHTML += `
                        <div class="ledger-row shadow-sm">
                            <div class="flex items-center gap-6">
                                <button onclick="deleteDoc('${doc.id}')" class="text-red-300 hover:text-red-600 transition text-xl">🗑️</button>
                                <div>
                                    <h3 class="text-xl font-bold text-slate-800">${d.name}</h3>
                                    <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">ACC: ${d.acc} | ${d.phone}</p>
                                </div>
                            </div>
                            <div class="text-right">
                                <h2 class="text-3xl font-black text-blue-600 italic">₹${d.balance.toLocaleString()}</h2>
                                <p class="text-[9px] font-black bg-blue-50 text-blue-500 px-3 py-1 rounded-full uppercase mt-1">
                                    Paid: ${d.paid_count}/${parseInt(d.years)*12}
                                </p>
                            </div>
                        </div>`;
                });
            }, error => {
                container.innerHTML = `<div class="bg-red-50 p-10 rounded-3xl text-red-500 font-bold border border-red-100">
                    ⚠️ DATABASE ERROR: Your browser is still seeing "Insufficient Permissions". <br><br>
                    Please REFRESH (Ctrl+R) and wait 30 seconds.
                </div>`;
            });
        }

        async function deleteDoc(id) {
            if(confirm("Delete this RD?")) await db.collection('accounts').doc(id).delete();
        }
    </script>
</body>
</html>
