<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Final Master Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 50px rgba(0,0,0,0.02); }
        input { background: #f1f5f9; border-radius: 1rem; padding: 1.1rem; outline: none; width: 100%; font-weight: 600; border: 2px solid transparent; }
        input:focus { border-color: #3b82f6; background: white; }
        .pay-option { border: 2px solid #f1f5f9; border-radius: 1.2rem; padding: 1rem; cursor: pointer; text-align: center; width: 100%; }
        .pay-option.active { border-color: #2563eb; background: #eff6ff; }
        /* Passbook */
        .passbook-card { background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); border-radius: 2.5rem; color: white; padding: 2.5rem; width: 100%; max-width: 450px; box-shadow: 0 30px 60px -12px rgba(37, 99, 235, 0.4); }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-12 w-full max-w-[440px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-10 tracking-tighter">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="nav('view-admin')" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold">Banker Console</button>
                <button onclick="nav('view-worker')" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold">Worker Terminal</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-6xl mx-auto">
            <h1 class="text-3xl font-black italic mb-8">Banker Console</h1>
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
                <div class="lg:col-span-5 glass-card p-8 space-y-4">
                    <p class="text-[10px] font-black text-blue-500 uppercase tracking-widest">New RD Registration</p>
                    <input id="r-acc" placeholder="Account Number">
                    <input id="r-name" placeholder="Full Name">
                    <input id="r-phone" placeholder="Mobile Number">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="r-denom" type="number" placeholder="Denom (₹)" oninput="calcAdminTotal()">
                        <input id="r-years" type="number" placeholder="Years">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="text-[9px] font-bold text-red-500 ml-2">APPLIED FINE (₹)</label>
                            <input id="r-fine" type="number" value="0" oninput="calcAdminTotal()">
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-emerald-500 ml-2">APPLIED REBATE (₹)</label>
                            <input id="r-rebate" type="number" value="0" oninput="calcAdminTotal()">
                        </div>
                    </div>
                    <div class="bg-slate-900 text-white p-6 rounded-2xl text-center">
                        <p class="text-[9px] font-bold opacity-40 uppercase">Total Payable</p>
                        <h2 id="r-total" class="text-3xl font-black italic">₹0</h2>
                    </div>
                    <button onclick="createAccount()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black">Register & Confirm</button>
                </div>
                <div class="lg:col-span-7 space-y-4" id="admin-list"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen flex flex-col items-center justify-center p-6 bg-emerald-50">
        <div class="glass-card p-10 w-full max-w-[480px]">
            <div id="w-search-box" class="space-y-6 text-center">
                <h2 class="font-black text-emerald-800 uppercase text-xs tracking-widest text-center">Worker Terminal</h2>
                <input id="w-phone" placeholder="Enter Mobile Number" class="text-center text-xl py-5 border-none outline-none">
                <button onclick="workerSearch()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">Search Client</button>
            </div>
            
            <div id="w-details" class="hidden space-y-6">
                <h3 id="wv-name" class="text-2xl font-black text-center uppercase italic">---</h3>
                <div class="bg-white p-6 rounded-3xl border border-emerald-100 space-y-2">
                    <div class="flex justify-between text-xs font-bold text-slate-400"><span>Denom</span><span id="wv-denom">₹0</span></div>
                    <div class="flex justify-between text-xs font-bold text-red-400"><span>Fine</span><span id="wv-fine">₹0</span></div>
                    <div class="flex justify-between text-xs font-bold text-emerald-500"><span>Rebate</span><span id="wv-rebate">₹0</span></div>
                    <hr class="my-2 border-dashed">
                    <div class="flex justify-between items-center"><span class="text-sm font-black text-slate-900">NET PAYABLE</span><span id="wv-total" class="text-2xl text-blue-700 font-black italic">₹0</span></div>
                </div>

                <div class="flex gap-4">
                    <div id="opt-cash" class="pay-option active" onclick="setPayMode('Cash')"><p class="text-[9px] font-bold uppercase">Cash</p></div>
                    <div id="opt-qr" class="pay-option" onclick="setPayMode('QR Code')"><p class="text-[9px] font-bold uppercase">QR Code</p></div>
                </div>

                <div id="otp-init-zone">
                    <button onclick="sendWorkerSMS()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black">Send Verification OTP</button>
                </div>

                <div id="otp-verify-zone" class="hidden space-y-4">
                    <input id="w-verify-otp" placeholder="Enter OTP" class="text-center text-3xl tracking-[0.4em] bg-white border-2 border-emerald-200 p-4 rounded-2xl">
                    <button onclick="confirmWorkerPayment()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">Verify & Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let activeUserDocId, activeUserData, currentOTP, selectedMode = 'Cash';

        function nav(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-admin') loadAdminLedger();
        }

        // Calculation with Fine & Rebate
        function calcAdminTotal() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            document.getElementById('r-total').innerText = "₹" + (d + f - r).toLocaleString('en-IN');
        }

        async function createAccount() {
            const name = document.getElementById('r-name').value.trim();
            const denom = parseFloat(document.getElementById('r-denom').value);
            const fine = parseFloat(document.getElementById('r-fine').value) || 0;
            const rebate = parseFloat(document.getElementById('r-rebate').value) || 0;

            if(!name || !denom) { alert("Fill required fields"); return; }

            await db.collection('accounts').add({
                acc: document.getElementById('r-acc').value,
                name: name.toUpperCase(),
                phone: document.getElementById('r-phone').value,
                denom: denom,
                fine: fine,
                rebate: rebate,
                years: parseInt(document.getElementById('r-years').value) || 1,
                balance: (denom + fine - rebate),
                paid_count: 1,
                created_at: new Date()
            });
            alert("Registered!");
            location.reload();
        }

        function loadAdminLedger() {
            db.collection('accounts').orderBy('created_at', 'desc').onSnapshot(snap => {
                const list = document.getElementById('admin-list'); list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="glass-card p-6 flex justify-between items-center mb-4">
                        <div><h4 class="font-black italic">${d.name}</h4><p class="text-[10px] font-bold text-slate-400">ACC: ${d.acc}</p></div>
                        <p class="text-xl font-black text-blue-600">₹${d.balance.toLocaleString('en-IN')}</p>
                    </div>`;
                });
            });
        }

        // Worker Search with Detailed Breakdown
        async function workerSearch() {
            const phone = document.getElementById('w-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                activeUserData = snap.docs[0].data(); activeUserDocId = snap.docs[0].id;
                document.getElementById('w-search-box').classList.add('hidden');
                document.getElementById('w-details').classList.remove('hidden');
                
                document.getElementById('wv-name').innerText = activeUserData.name;
                document.getElementById('wv-denom').innerText = "₹" + activeUserData.denom.toLocaleString('en-IN');
                document.getElementById('wv-fine').innerText = "₹" + (activeUserData.fine || 0).toLocaleString('en-IN');
                document.getElementById('wv-rebate').innerText = "₹" + (activeUserData.rebate || 0).toLocaleString('en-IN');
                
                window.workerTotal = activeUserData.denom + (activeUserData.fine || 0) - (activeUserData.rebate || 0);
                document.getElementById('wv-total').innerText = "₹" + window.workerTotal.toLocaleString('en-IN');
            } else { alert("User Not Found"); }
        }

        function setPayMode(m) {
            selectedMode = m;
            document.getElementById('opt-cash').classList.toggle('active', m === 'Cash');
            document.getElementById('opt-qr').classList.toggle('active', m === 'QR Code');
        }

        async function sendWorkerSMS() {
            currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
            await db.collection('accounts').doc(activeUserDocId).update({ otp: currentOTP });
            alert(`[SMS] To: ${activeUserData.phone}\nVerification Code: ${currentOTP}`);
            document.getElementById('otp-init-zone').classList.add('hidden');
            document.getElementById('otp-verify-zone').classList.remove('hidden');
        }

        async function confirmWorkerPayment() {
            if(document.getElementById('w-verify-otp').value === currentOTP) {
                const newBal = (activeUserData.balance || 0) + window.workerTotal;
                await db.collection('accounts').doc(activeUserDocId).update({
                    balance: newBal, paid_count: firebase.firestore.FieldValue.increment(1), otp: "0000"
                });
                alert("Deposit Successful!");
                location.reload();
            } else { alert("OTP Wrong"); }
        }
    </script>
</body>
</html>
