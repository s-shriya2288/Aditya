<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Pro RD System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 50px rgba(0,0,0,0.02); }
        .btn-primary { background: #2563eb; color: white; font-weight: 800; padding: 1.2rem; border-radius: 1.2rem; width: 100%; transition: 0.3s; box-shadow: 0 10px 25px -5px rgba(37, 99, 235, 0.4); }
        
        /* Payment Toggle */
        .pay-option { border: 2px solid #f1f5f9; border-radius: 1.2rem; padding: 1rem; cursor: pointer; transition: 0.2s; text-align: center; width: 100%; }
        .pay-option.active { border-color: #2563eb; background: #eff6ff; }

        /* Receipt */
        .receipt-paper { background: white; width: 100%; max-width: 400px; border-radius: 20px; padding: 40px; position: relative; }
        .receipt-paper::before { content: ""; position: absolute; top: -10px; left: 0; right: 0; height: 20px; background-image: radial-gradient(circle, white 5px, transparent 6px); background-size: 15px 20px; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div class="glass-card p-12 w-full max-w-[440px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-10 tracking-tighter">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="nav('view-auth')" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold">Worker Terminal</button>
            </div>
        </div>
    </div>

    <div id="view-worker" class="min-h-screen flex flex-col items-center justify-center p-6 bg-emerald-50">
        <div class="glass-card p-10 w-full max-w-[500px]">
            <div id="w-search-box" class="space-y-6 text-center">
                <h2 class="font-black text-emerald-800 uppercase text-xs tracking-widest">Collection Desk</h2>
                <input id="w-phone" placeholder="Enter Mobile Number" class="text-center text-xl py-5 bg-slate-50 rounded-2xl w-full border-none outline-none">
                <button onclick="workerSearch()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-lg">Verify Member</button>
            </div>
            
            <div id="w-details" class="hidden space-y-6">
                <div class="text-center">
                    <h3 id="wv-name" class="text-2xl font-black uppercase italic">---</h3>
                    <p id="wv-phone-display" class="text-xs font-bold text-slate-400 mt-1">---</p>
                </div>

                <div class="bg-slate-50 p-6 rounded-3xl border border-slate-100 space-y-3">
                    <div class="flex justify-between text-xs font-bold"><span>Total Payable</span><span id="wv-total" class="text-xl text-blue-700 font-black">₹0</span></div>
                </div>

                <div class="space-y-3">
                    <label class="text-[9px] font-black text-slate-400 text-center">SELECT PAYMENT MODE</label>
                    <div class="flex gap-4">
                        <div id="opt-cash" class="pay-option active" onclick="setPayMode('Cash')">
                            <p class="text-lg">💵</p><p class="text-[10px] font-bold uppercase mt-1">Cash</p>
                        </div>
                        <div id="opt-qr" class="pay-option" onclick="setPayMode('QR Code')">
                            <p class="text-lg">📱</p><p class="text-[10px] font-bold uppercase mt-1">QR Scan</p>
                        </div>
                    </div>
                </div>

                <div id="otp-init-zone">
                    <button onclick="sendWorkerSMS()" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-black shadow-lg">
                        Send Verification SMS to Client
                    </button>
                </div>

                <div id="otp-verify-zone" class="hidden space-y-4">
                    <div class="bg-blue-50 p-4 rounded-xl text-center">
                        <p class="text-[10px] font-bold text-blue-600 uppercase">SMS Sent to Client's Phone</p>
                    </div>
                    <input id="w-verify-otp" placeholder="Enter 4-Digit OTP" class="text-center text-3xl tracking-[0.4em] bg-white border-2 border-emerald-200 p-4 rounded-2xl w-full outline-none">
                    <button onclick="confirmWorkerPaymentWithOTP()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black shadow-xl">Complete Transaction</button>
                </div>
            </div>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
        <div id="receipt-to-print" class="receipt-paper shadow-2xl">
            <div class="text-center mb-6">
                <h2 class="text-xl font-black uppercase italic text-blue-900">SecureBank India</h2>
                <p id="rec-mode" class="text-[8px] font-black bg-slate-100 px-3 py-1 rounded-full inline-block mt-2">PAID VIA ---</p>
            </div>
            <div class="border-y border-dashed border-slate-200 py-4 space-y-2">
                <div class="flex justify-between text-[10px] font-bold"><span>Customer</span><span id="rec-name">---</span></div>
                <div class="flex justify-between text-[10px] font-bold"><span>Amount</span><span id="rec-amount">₹0</span></div>
            </div>
            <div class="py-6 text-center">
                <p class="text-[9px] font-bold text-slate-400">NEXT DUE DATE</p>
                <p id="rec-next-date" class="text-lg font-black text-slate-900 tracking-tighter">---</p>
            </div>
            <p class="text-[8px] text-center text-slate-300 uppercase">Transaction ID: SB-TXN-2026</p>
        </div>
        <div class="fixed bottom-10 flex gap-4">
            <button onclick="downloadTransactionPDF()" class="bg-white text-black px-8 py-4 rounded-2xl font-bold">Download PDF</button>
            <button onclick="location.reload()" class="bg-emerald-500 text-white px-8 py-4 rounded-2xl font-bold">Finish</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG (Hidden for security)
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let activeUserDocId, activeUserData, currentOTP;
        let selectedMode = 'Cash';

        function nav(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function setPayMode(mode) {
            selectedMode = mode;
            document.getElementById('opt-cash').classList.toggle('active', mode === 'Cash');
            document.getElementById('opt-qr').classList.toggle('active', mode === 'QR Code');
        }

        async function workerSearch() {
            const phone = document.getElementById('w-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                activeUserData = snap.docs[0].data(); activeUserDocId = snap.docs[0].id;
                document.getElementById('w-search-box').classList.add('hidden');
                document.getElementById('w-details').classList.remove('hidden');
                document.getElementById('wv-name').innerText = activeUserData.name;
                document.getElementById('wv-phone-display').innerText = "+91 " + activeUserData.phone;
                window.workerTotal = activeUserData.denom + activeUserData.fine - activeUserData.rebate;
                document.getElementById('wv-total').innerText = "₹" + window.workerTotal.toLocaleString('en-IN');
            } else { alert("Member Not Found"); }
        }

        // STEP 3: WORKER SENDS SMS
        async function sendWorkerSMS() {
            currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
            
            // In a real production app, you would call an SMS API here (like Twilio or Msg91)
            // For this UI build, we update the DB and alert for testing
            await db.collection('accounts').doc(activeUserDocId).update({ otp: currentOTP });
            
            alert(`[SMS SIMULATION] To: ${activeUserData.phone}\nMessage: Your SecureBank Verification Code is ${currentOTP}. Amount: ₹${window.workerTotal}`);
            
            document.getElementById('otp-init-zone').classList.add('hidden');
            document.getElementById('otp-verify-zone').classList.remove('hidden');
        }

        async function confirmWorkerPaymentWithOTP() {
            const inputOTP = document.getElementById('w-verify-otp').value;
            if(inputOTP === currentOTP) {
                const newBalance = (activeUserData.balance || 0) + window.workerTotal;
                
                await db.collection('accounts').doc(activeUserDocId).update({
                    balance: newBalance,
                    paid_count: firebase.firestore.FieldValue.increment(1),
                    otp: "0000"
                });

                // Set Receipt Info
                document.getElementById('rec-name').innerText = activeUserData.name;
                document.getElementById('rec-amount').innerText = "₹" + window.workerTotal.toLocaleString('en-IN');
                document.getElementById('rec-mode').innerText = "PAID VIA " + selectedMode;
                
                const nextDate = new Date();
                nextDate.setMonth(nextDate.getMonth() + 1);
                nextDate.setDate(7);
                document.getElementById('rec-next-date').innerText = nextDate.toLocaleDateString('en-GB');

                document.getElementById('receipt-modal').classList.remove('hidden');
            } else {
                alert("Incorrect OTP. Please check the code sent to the client.");
            }
        }

        async function downloadTransactionPDF() {
            const element = document.getElementById('receipt-to-print');
            const canvas = await html2canvas(element, { scale: 3 });
            const imgData = canvas.toDataURL('image/png');
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', [100, 160]);
            pdf.addImage(imgData, 'PNG', 0, 0, 100, 160);
            pdf.save(`Receipt_${activeUserData.name}.pdf`);
        }
    </script>
</body>
</html>
