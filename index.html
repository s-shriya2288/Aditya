<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Ultimate Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; margin: 0; scroll-behavior: smooth; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 3rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 40px -10px rgba(0,0,0,0.03); }
        
        .passbook-card { 
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); 
            border-radius: 2.5rem; color: white; padding: 2.5rem; width: 100%; max-width: 480px; 
            box-shadow: 0 30px 60px -12px rgba(37, 99, 235, 0.3);
        }
        .balance-text { font-size: clamp(1.2rem, 7vw, 3rem); font-weight: 900; font-style: italic; word-break: break-all; }

        input { background: #f1f5f9; border-radius: 1.2rem; padding: 1.2rem; outline: none; width: 100%; font-weight: 700; border: 2px solid transparent; transition: 0.3s; }
        input:focus { border-color: #3b82f6; background: white; }

        .receipt-line { display: flex; justify-content: space-between; padding: 0.8rem 0; border-bottom: 1px dashed #e2e8f0; }
        .cal-day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 0.8rem; font-size: 0.75rem; font-weight: 800; background: #f8fafc; border: 1px solid #f1f5f9; }
        .cal-paid { background: #10b981; color: white; border: none; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-12 w-full max-w-[450px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-10">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="checkAuth('view-admin')" class="w-full bg-slate-900 text-white py-5 rounded-2xl font-bold">Banker Console</button>
                <button onclick="checkAuth('view-worker')" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold">Worker Terminal</button>
                <button onclick="nav('view-client-login')" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-[1200px] mx-auto">
            <h1 class="text-2xl font-black mb-8 italic">Register New RD Account</h1>
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8 space-y-4">
                    <input id="r-acc" placeholder="Account Number">
                    <input id="r-name" placeholder="Full Name">
                    <input id="r-phone" placeholder="Phone Number">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="r-denom" type="number" placeholder="Denom (₹)">
                        <input id="r-years" type="number" placeholder="Years">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <input id="r-rebate" type="number" placeholder="Rebate (₹)">
                        <input id="r-fine" type="number" placeholder="Fine (₹)">
                    </div>
                    <div class="p-4 bg-blue-50 rounded-xl">
                        <label class="text-[10px] font-bold text-blue-400 block mb-1">DEPOSIT DATE</label>
                        <input id="r-date" type="date" class="!bg-transparent !p-0">
                    </div>
                    <button onclick="createAccount()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">Register Member</button>
                </div>
                <div id="admin-ledger" class="space-y-3"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen flex flex-col items-center p-8 bg-[#f0fdf4]">
        <div class="glass-card p-10 w-full max-w-[500px]">
            <div id="w-search-box" class="space-y-4">
                <input id="w-phone" placeholder="Client Phone Number" class="text-center">
                <button onclick="workerSearch()" class="w-full bg-emerald-600 text-white py-4 rounded-2xl font-black">Verify Client</button>
            </div>
            <div id="w-details" class="hidden">
                <h3 id="wv-name" class="text-2xl font-black text-center mb-6 uppercase italic">---</h3>
                <div class="bg-slate-50 p-6 rounded-2xl mb-6">
                    <div class="receipt-line"><span>Denomination</span><span id="wv-denom">₹0</span></div>
                    <div class="receipt-line"><span class="text-red-500">Late Fine (+)</span><span id="wv-fine" class="text-red-500">₹0</span></div>
                    <div class="receipt-line"><span class="text-emerald-600">Rebate (-)</span><span id="wv-rebate" class="text-emerald-600">₹0</span></div>
                    <div class="mt-4 pt-4 border-t border-slate-200 flex justify-between font-black">
                        <span>NET TOTAL</span><span id="wv-total" class="text-blue-700 text-2xl">₹0</span>
                    </div>
                </div>
                <button onclick="confirmWorkerPayment()" class="w-full bg-emerald-600 text-white py-5 rounded-2xl font-black">Confirm Collection</button>
            </div>
        </div>
    </div>

    <div id="view-passbook" class="hidden flex flex-col items-center p-8 pb-20">
        <div class="passbook-card mb-10">
            <p id="p-name" class="text-lg font-bold mb-1 uppercase opacity-80">---</p>
            <h1 id="p-balance" class="balance-text">₹0</h1>
            <div class="flex justify-between border-t border-white/10 pt-4 text-[9px] font-black opacity-40 mt-4">
                <span id="p-acc">ACC: ****</span>
                <span>SECURE LEDGER</span>
            </div>
        </div>
        <div class="w-full max-w-[480px] space-y-4">
            <div class="grid grid-cols-3 gap-3">
                <div class="glass-card p-4 text-center"><p class="text-[8px] font-bold text-slate-400 uppercase">Denom</p><p id="p-denom" class="font-black text-sm">₹0</p></div>
                <div class="glass-card p-4 text-center"><p class="text-[8px] font-bold text-red-400 uppercase">Fine</p><p id="p-fine" class="font-black text-sm text-red-500">₹0</p></div>
                <div class="glass-card p-4 text-center"><p class="text-[8px] font-bold text-emerald-500 uppercase">Rebate</p><p id="p-rebate" class="font-black text-sm text-emerald-600">₹0</p></div>
            </div>
            <div class="glass-card p-8">
                <p id="p-paid" class="text-center font-black text-blue-900 mb-6 uppercase text-xs tracking-widest">Paid: 0/0</p>
                <div id="calendar-view" class="grid grid-cols-7 gap-2"></div>
            </div>
        </div>
        <button onclick="location.reload()" class="mt-8 text-slate-300 font-bold uppercase text-[9px]">Exit Passbook</button>
    </div>

    <div id="view-auth" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-900/5 backdrop-blur-sm">
        <div class="glass-card p-10 w-full max-w-[380px] text-center">
            <input id="auth-pin" type="password" placeholder="PIN" class="text-center text-3xl mb-6">
            <button onclick="verifyAccess()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">Enter</button>
        </div>
    </div>

    <div id="view-client-login" class="hidden min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-10 w-full max-w-[420px] text-center">
            <div id="c-s1" class="space-y-4">
                <input id="c-phone-login" placeholder="Phone Number">
                <button onclick="sendOTP()" class="w-full bg-blue-600 text-white py-4 rounded-2xl font-black">Get Dynamic OTP</button>
            </div>
            <div id="c-s2" class="hidden space-y-6">
                <input id="c-otp" maxlength="4" placeholder="0000" class="text-center text-4xl">
                <button onclick="validateOTP()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black">Unlock</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let pendingNavId = null;
        let activeUserDocId = null;
        let activeUserData = null;
        let currentOTP = null;
        const MASTER_PIN = "1234";

        function checkAuth(id) { pendingNavId = id; nav('view-auth'); }
        function verifyAccess() { if(document.getElementById('auth-pin').value === MASTER_PIN) { nav(pendingNavId); } else { alert("Denied"); } }
        function nav(id) { document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden')); document.getElementById(id).classList.remove('hidden'); if(id === 'view-admin') loadLedger(); }

        async function createAccount() {
            const d = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value.toUpperCase(),
                phone: document.getElementById('r-phone').value,
                denom: parseFloat(document.getElementById('r-denom').value),
                years: document.getElementById('r-years').value,
                rebate: parseFloat(document.getElementById('r-rebate').value) || 0,
                fine: parseFloat(document.getElementById('r-fine').value) || 0,
                sub_date: document.getElementById('r-date').value,
                balance: parseFloat(document.getElementById('r-denom').value),
                paid_count: 1,
                otp: "0000",
                created_at: new Date()
            };
            await db.collection('accounts').add(d);
            alert("Registered!");
            loadLedger();
        }

        async function workerSearch() {
            const phone = document.getElementById('w-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                activeUserData = snap.docs[0].data();
                activeUserDocId = snap.docs[0].id;
                document.getElementById('w-search-box').classList.add('hidden');
                document.getElementById('w-details').classList.remove('hidden');
                document.getElementById('wv-name').innerText = activeUserData.name;
                document.getElementById('wv-denom').innerText = "₹" + activeUserData.denom;
                document.getElementById('wv-fine').innerText = "₹" + activeUserData.fine;
                document.getElementById('wv-rebate').innerText = "₹" + activeUserData.rebate;
                window.workerTotal = activeUserData.denom + activeUserData.fine - activeUserData.rebate;
                document.getElementById('wv-total').innerText = "₹" + window.workerTotal;
            }
        }

        async function confirmWorkerPayment() {
            await db.collection('accounts').doc(activeUserDocId).update({
                balance: firebase.firestore.FieldValue.increment(window.workerTotal),
                paid_count: firebase.firestore.FieldValue.increment(1)
            });
            alert("Payment Recorded!");
            location.reload();
        }

        async function sendOTP() {
            const phone = document.getElementById('c-phone-login').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                activeUserDocId = snap.docs[0].id;
                currentOTP = Math.floor(1000 + Math.random() * 9000).toString();
                await db.collection('accounts').doc(activeUserDocId).update({ otp: currentOTP });
                alert("OTP: " + currentOTP);
                document.getElementById('c-s1').classList.add('hidden');
                document.getElementById('c-s2').classList.remove('hidden');
            }
        }

        function validateOTP() { if(document.getElementById('c-otp').value === currentOTP) { fetchAndRender(); } }

        async function fetchAndRender() {
            const doc = await db.collection('accounts').doc(activeUserDocId).get();
            activeUserData = doc.data();
            document.getElementById('p-name').innerText = activeUserData.name;
            document.getElementById('p-balance').innerText = "₹" + activeUserData.balance.toLocaleString('en-IN');
            document.getElementById('p-denom').innerText = "₹" + activeUserData.denom;
            document.getElementById('p-rebate').innerText = "₹" + activeUserData.rebate;
            document.getElementById('p-fine').innerText = "₹" + activeUserData.fine;
            document.getElementById('p-acc').innerText = "ACC: ****" + activeUserData.acc.slice(-4);
            document.getElementById('p-paid').innerText = `Paid: ${activeUserData.paid_count} / ${parseInt(activeUserData.years) * 12}`;
            
            const cal = document.getElementById('calendar-view'); cal.innerHTML = '';
            const day = new Date(activeUserData.sub_date).getDate();
            for(let i=1; i<=31; i++) cal.innerHTML += `<div class="cal-day ${i===day?'cal-paid':''}">${i}</div>`;
            nav('view-passbook');
        }

        function loadLedger() {
            db.collection('accounts').orderBy('created_at', 'desc').onSnapshot(snap => {
                const list = document.getElementById('admin-ledger'); list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="glass-card p-4 flex justify-between"><div><p class="font-bold">${d.name}</p></div><p class="font-black text-blue-600">₹${d.balance}</p></div>`;
                });
            });
        }
    </script>
</body>
</html>
