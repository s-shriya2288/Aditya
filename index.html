<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | All-in-One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8fafc; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 2rem; border: 1px solid #f1f5f9; box-shadow: 0 10px 30px rgba(0,0,0,0.03); }
        .passbook-blue { background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); border-radius: 2rem; color: white; padding: 2.5rem; }
        input { background: #f1f5f9; border-radius: 0.8rem; padding: 1rem; width: 100%; border: 2px solid transparent; font-weight: 600; }
        input:focus { border-color: #3b82f6; background: white; outline: none; }
        .btn-primary { width: 100%; padding: 1.2rem; border-radius: 1rem; font-weight: 800; color: white; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-10 w-full max-w-[400px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-8">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="nav('view-admin')" class="btn-primary bg-[#0f172a]">Banker Console</button>
                <button onclick="nav('view-worker')" class="btn-primary bg-emerald-700">Worker Terminal</button>
                <button onclick="nav('view-client-login')" class="btn-primary bg-blue-600">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic">Banker Console</h2>
                <button onclick="nav('view-hub')" class="text-xs font-bold text-slate-400">Back to Hub</button>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass-card p-8 space-y-4">
                    <p class="text-[10px] font-bold text-blue-500 uppercase tracking-widest">New Member Entry</p>
                    <input id="r-acc" placeholder="Account No (e.g., 23422038)">
                    <input id="r-name" placeholder="Member Name">
                    <input id="r-phone" placeholder="Phone Number">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="r-denom" type="number" placeholder="Denom (₹)" oninput="calcTotal()">
                        <input id="r-fine" type="number" placeholder="Fine (₹)" oninput="calcTotal()">
                    </div>
                    <div class="bg-slate-900 text-white p-4 rounded-xl text-center">
                        <p class="text-[9px] opacity-50">ESTIMATED FIRST DEPOSIT</p>
                        <h3 id="r-total" class="text-2xl font-black italic">₹0</h3>
                    </div>
                    <button onclick="registerUser()" class="btn-primary bg-blue-600">Register Member</button>
                </div>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen flex items-center justify-center p-6 bg-emerald-50">
        <div class="glass-card p-10 w-full max-w-[440px]">
            <div id="w-search" class="text-center space-y-6">
                <h3 class="font-black text-emerald-800 uppercase text-xs tracking-widest">Collection Desk</h3>
                <input id="w-query" placeholder="Enter Mobile Number" class="text-center text-xl">
                <button onclick="workerSearch()" class="btn-primary bg-emerald-600">Search Member</button>
            </div>
            
            <div id="w-deposit" class="hidden space-y-6">
                <h2 id="wv-name" class="text-2xl font-black text-center italic">---</h2>
                <div class="bg-white p-6 rounded-2xl border-2 border-slate-100">
                    <div class="flex justify-between text-sm font-bold"><span>Denom:</span><span id="wv-denom">₹0</span></div>
                    <div class="flex justify-between text-sm font-bold text-red-500"><span>Fine (+):</span><span id="wv-fine">₹0</span></div>
                    <div class="flex justify-between text-sm font-bold text-emerald-500"><span>Rebate (-):</span><span id="wv-rebate">₹0</span></div>
                    <hr class="my-4 border-dashed">
                    <div class="flex justify-between items-center"><span class="font-black">PAYABLE</span><span id="wv-total" class="text-2xl font-black text-blue-700 italic">₹0</span></div>
                </div>
                <button onclick="workerSendOTP()" class="btn-primary bg-slate-900">Send Verification OTP</button>
                <div id="w-otp-zone" class="hidden space-y-4 pt-4">
                    <input id="w-otp-input" placeholder="Enter OTP" class="text-center text-3xl tracking-widest">
                    <button onclick="finalizeDeposit()" class="btn-primary bg-emerald-600">Complete Deposit</button>
                </div>
            </div>
        </div>
    </div>

    <div id="view-client-login" class="hidden min-h-screen flex items-center justify-center p-6 bg-blue-50">
        <div class="glass-card p-10 w-full max-w-[400px] text-center">
            <h2 class="text-2xl font-black italic mb-8">Passbook Access</h2>
            <div id="c-login-1" class="space-y-4">
                <input id="c-phone" placeholder="Mobile Number">
                <button onclick="clientSendOTP()" class="btn-primary bg-blue-600">Get Access OTP</button>
            </div>
            <div id="c-login-2" class="hidden space-y-4">
                <input id="c-otp" placeholder="••••" class="text-center text-4xl">
                <button onclick="verifyClient()" class="btn-primary bg-slate-900">Enter Ledger</button>
            </div>
        </div>
    </div>

    <div id="view-passbook" class="hidden min-h-screen flex flex-col items-center p-8">
        <p class="text-[10px] font-black text-slate-300 tracking-[0.4em] uppercase mb-8">Secure Digital Ledger</p>
        <div class="passbook-blue w-full max-w-[450px] mb-8 relative overflow-hidden">
            <p id="p-name" class="text-lg font-bold opacity-80 uppercase">---</p>
            <h1 id="p-balance" class="text-4xl font-black italic tracking-tighter">₹0</h1>
            <div class="mt-10 pt-5 border-t border-white/10 flex justify-between text-[9px] font-black opacity-40">
                <span>AUTHENTICATED</span>
                <span id="p-acc">ACC: ---</span>
            </div>
        </div>
        
        <div class="w-full max-w-[450px] grid grid-cols-2 gap-4">
            <div class="glass-card p-6 text-center"><label class="text-[9px] font-bold text-slate-400 block mb-1">DENOM</label><p id="p-denom" class="font-black text-xl">₹0</p></div>
            <div class="glass-card p-6 text-center"><label class="text-[9px] font-bold text-slate-400 block mb-1">PAID MONTHS</label><p id="p-paid" class="font-black text-xl">0/12</p></div>
            <div class="glass-card p-6 text-center"><label class="text-[9px] font-bold text-emerald-500 block mb-1">APPLIED REBATE</label><p id="p-rebate" class="font-black text-xl">₹0</p></div>
            <div class="glass-card p-6 text-center"><label class="text-[9px] font-bold text-red-500 block mb-1">APPLIED FINE</label><p id="p-fine" class="font-black text-xl">₹0</p></div>
        </div>
        <button onclick="downloadReceipt()" class="mt-8 w-full max-w-[450px] btn-primary bg-slate-900">Download Latest Receipt (PDF)</button>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSy...", projectId: "bank-d463e", appId: "1:29321..." };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let activeUser, activeDocId, tempOTP;

        function nav(id) {
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-admin') loadAdminList();
        }

        // BANKER LOGIC
        function calcTotal() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            document.getElementById('r-total').innerText = "₹" + (d + f).toLocaleString();
        }

        async function registerUser() {
            const data = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value.toUpperCase(),
                phone: document.getElementById('r-phone').value,
                denom: parseFloat(document.getElementById('r-denom').value),
                fine: parseFloat(document.getElementById('r-fine').value) || 0,
                rebate: 0,
                balance: 0,
                paid_count: 0
            };
            await db.collection('accounts').add(data);
            alert("Registered!");
            location.reload();
        }

        // WORKER LOGIC
        async function workerSearch() {
            const q = document.getElementById('w-query').value;
            const snap = await db.collection('accounts').where('phone', '==', q).get();
            if(!snap.empty) {
                activeUser = snap.docs[0].data();
                activeDocId = snap.docs[0].id;
                document.getElementById('w-search').classList.add('hidden');
                document.getElementById('w-deposit').classList.remove('hidden');
                document.getElementById('wv-name').innerText = activeUser.name;
                document.getElementById('wv-denom').innerText = "₹" + activeUser.denom.toLocaleString();
                document.getElementById('wv-fine').innerText = "₹" + activeUser.fine.toLocaleString();
                document.getElementById('wv-total').innerText = "₹" + (activeUser.denom + activeUser.fine).toLocaleString();
            }
        }

        async function workerSendOTP() {
            tempOTP = Math.floor(1000 + Math.random() * 9000).toString();
            alert(`[SMS to Client] Verification Code: ${tempOTP}`);
            document.getElementById('w-otp-zone').classList.remove('hidden');
        }

        async function finalizeDeposit() {
            if(document.getElementById('w-otp-input').value === tempOTP) {
                const amount = activeUser.denom + activeUser.fine;
                await db.collection('accounts').doc(activeDocId).update({
                    balance: firebase.firestore.FieldValue.increment(amount),
                    paid_count: firebase.firestore.FieldValue.increment(1)
                });
                alert("Deposit Successful!");
                location.reload();
            }
        }

        // CLIENT LOGIC
        async function clientSendOTP() {
            const p = document.getElementById('c-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', p).get();
            if(!snap.empty) {
                activeUser = snap.docs[0].data();
                tempOTP = Math.floor(1000 + Math.random() * 9000).toString();
                alert(`[SMS] Access OTP: ${tempOTP}`);
                document.getElementById('c-login-1').classList.add('hidden');
                document.getElementById('c-login-2').classList.remove('hidden');
            }
        }

        function verifyClient() {
            if(document.getElementById('c-otp').value === tempOTP) {
                document.getElementById('p-name').innerText = activeUser.name;
                document.getElementById('p-balance').innerText = "₹" + activeUser.balance.toLocaleString();
                document.getElementById('p-denom').innerText = "₹" + activeUser.denom.toLocaleString();
                document.getElementById('p-paid').innerText = `${activeUser.paid_count}/12`;
                document.getElementById('p-fine').innerText = "₹" + activeUser.fine.toLocaleString();
                document.getElementById('p-acc').innerText = "ACC: " + activeUser.acc;
                nav('view-passbook');
            }
        }
    </script>
</body>
</html>
