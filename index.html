<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank | Private Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans">

    <div id="auth-gate" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md">
            <h2 class="text-3xl font-black text-blue-900 mb-2">SecureBank</h2>
            <p class="text-slate-400 text-sm mb-8">Unauthorized access is strictly prohibited.</p>
            
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Banker/User Email" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-500">
                <input id="pass" type="password" placeholder="Secure Password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-500">
                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold shadow-lg hover:bg-blue-700 transition">Unlock System</button>
            </div>
            <p id="error-msg" class="text-red-500 text-xs mt-4 text-center hidden"></p>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white p-4 shadow-sm flex justify-between items-center">
            <span class="font-bold text-blue-900">🏦 SecureBank Pro</span>
            <button onclick="handleLogout()" class="text-xs font-bold text-red-500 uppercase">Log Out</button>
        </nav>
        <div id="dashboard-content" class="p-6">
            <h1 class="text-2xl font-bold">Welcome, Authorized User</h1>
        </div>
    </div>

    <script>
        const firebaseConfig = { /* PASTE YOUR KEYS HERE */ };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // 1. LOGIN LOGIC
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            try {
                await auth.signInWithEmailAndPassword(email, pass);
            } catch (error) {
                const errEl = document.getElementById('error-msg');
                errEl.innerText = "Invalid Credentials";
                errEl.classList.remove('hidden');
            }
        }

        // 2. AUTH STATE LISTENER (The most important part for privacy)
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is signed in
                document.getElementById('auth-gate').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                loadUserData(user.uid);
            } else {
                // No user is signed in
                document.getElementById('auth-gate').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        async function handleLogout() {
            await auth.signOut();
        }

        function loadUserData(uid) {
            console.log("Loading private data for:", uid);
            // Here you would fetch ONLY the data this user is allowed to see
        }
    </script>
</body>
</html>
