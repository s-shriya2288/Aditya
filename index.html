<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank Multi-Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
</head>
<body class="bg-slate-100 font-sans">

    <div id="portal-select" class="min-h-screen flex flex-col items-center justify-center p-6">
        <h1 class="text-4xl font-black text-blue-900 mb-8 italic">SecureBank PRO</h1>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 w-full max-w-4xl">
            <button onclick="showAuth('admin')" class="bg-white p-8 rounded-3xl shadow-xl hover:scale-105 transition border-b-8 border-blue-600">
                <span class="text-4xl">🔑</span>
                <h3 class="font-bold mt-4">ADMIN</h3>
            </button>
            <button onclick="showAuth('worker')" class="bg-white p-8 rounded-3xl shadow-xl hover:scale-105 transition border-b-8 border-green-600">
                <span class="text-4xl">👷</span>
                <h3 class="font-bold mt-4">WORKER</h3>
            </button>
            <button onclick="showAuth('client')" class="bg-white p-8 rounded-3xl shadow-xl hover:scale-105 transition border-b-8 border-orange-600">
                <span class="text-4xl">📱</span>
                <h3 class="font-bold mt-4">CLIENT</h3>
            </button>
        </div>
    </div>

    <div id="auth-modal" class="hidden fixed inset-0 bg-black/50 flex items-center justify-center p-4">
        <div class="bg-white p-10 rounded-[2.5rem] w-full max-w-md relative">
            <button onclick="location.reload()" class="absolute top-6 right-6 text-slate-300">✕</button>
            <h2 id="modal-title" class="text-2xl font-black mb-6 uppercase tracking-tighter">Login</h2>
            
            <div id="email-fields" class="space-y-4 hidden">
                <input id="email" type="email" placeholder="Staff Email" class="w-full p-4 bg-slate-50 rounded-xl border">
                <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-xl border">
                <button onclick="staffLogin()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Enter Portal</button>
            </div>

            <div id="phone-fields" class="space-y-4 hidden">
                <input id="phone" type="text" placeholder="+91 99999 99999" class="w-full p-4 bg-slate-50 rounded-xl border">
                <div id="recaptcha-container"></div>
                <button id="send-otp" onclick="sendOTP()" class="w-full bg-orange-500 text-white py-4 rounded-xl font-bold">Send OTP</button>
                <input id="otp" type="text" placeholder="Enter 6-digit OTP" class="w-full p-4 bg-slate-50 rounded-xl border hidden">
                <button id="verify-otp" onclick="verifyOTP()" class="w-full bg-green-600 text-white py-4 rounded-xl font-bold hidden">Verify & Login</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            messagingSenderId: "293213633601",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentRole = '';
        let confirmationResult;

        function showAuth(role) {
            currentRole = role;
            document.getElementById('portal-select').classList.add('hidden');
            document.getElementById('auth-modal').classList.remove('hidden');
            document.getElementById('modal-title').innerText = `${role} access`;
            
            if(role === 'client') {
                document.getElementById('phone-fields').classList.remove('hidden');
            } else {
                document.getElementById('email-fields').classList.remove('hidden');
            }
        }

        // --- PHONE AUTH LOGIC ---
        function sendOTP() {
            const num = document.getElementById('phone').value;
            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
            auth.signInWithPhoneNumber(num, appVerifier).then(res => {
                confirmationResult = res;
                document.getElementById('otp').classList.remove('hidden');
                document.getElementById('verify-otp').classList.remove('hidden');
                document.getElementById('send-otp').classList.add('hidden');
            }).catch(err => alert(err.message));
        }

        function verifyOTP() {
            const code = document.getElementById('otp').value;
            confirmationResult.confirm(code).then(() => {
                window.location.href = "client_dashboard.html"; // Redirect to your client page
            }).catch(err => alert("Wrong OTP"));
        }

        // --- STAFF LOGIN ---
        async function staffLogin() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                const res = await auth.signInWithEmailAndPassword(e, p);
                // Check if user is actually an admin or worker in Firestore
                const doc = await db.collection('users').doc(res.user.uid).get();
                if(doc.data().role === currentRole) {
                    window.location.href = currentRole + "_dashboard.html";
                } else {
                    alert("Unauthorized for this portal!");
                    auth.signOut();
                }
            } catch(err) { alert(err.message); }
        }
    </script>
</body>
</html>
