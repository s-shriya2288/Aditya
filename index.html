<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="view-auth" class="min-h-screen flex items-center justify-center p-6">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-md border border-slate-200">
            <h2 id="auth-title" class="text-3xl font-black text-blue-900 mb-2 italic">SecureBank</h2>
            <div class="space-y-4">
                <input id="email" type="email" placeholder="Email" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-500">
                <input id="pass" type="password" placeholder="Password" class="w-full p-4 bg-slate-50 rounded-2xl border outline-none focus:ring-2 focus:ring-blue-500">
                <button id="auth-btn" onclick="handleAuth()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Unlock System</button>
            </div>
            <button onclick="toggleReg()" id="reg-toggle" class="w-full mt-6 text-xs font-bold text-blue-500 uppercase tracking-widest">Register New Admin</button>
        </div>
    </div>

    <div id="main-app" class="hidden">
        <nav class="bg-white p-5 shadow-sm flex justify-between items-center sticky top-0">
            <h1 class="font-black text-blue-900 italic">SecureBank PRO</h1>
            <button onclick="firebase.auth().signOut()" class="text-red-500 font-bold text-xs uppercase">Logout</button>
        </nav>

        <div class="p-6 max-w-4xl mx-auto">
            <input type="text" id="search" oninput="renderList()" placeholder="🔍 Search Shriya..." class="w-full p-5 rounded-3xl border shadow-sm mb-6 text-lg">
            <div id="client-list" class="space-y-4"></div>
        </div>
    </div>

    <script>
        // UPDATED WITH YOUR ACTUAL KEYS FROM SCREENSHOT 4
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            messagingSenderId: "293213633601",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let isReg = false;
        let accounts = [
            { name: "Shriya Shrivastav", amt: "1,00,000", acc: "SB-9921", otp: "1693" }
        ];

        function toggleReg() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? "Register Admin" : "SecureBank Login";
        }

        async function handleAuth() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(isReg) await auth.createUserWithEmailAndPassword(e, p);
                else await auth.signInWithEmailAndPassword(e, p);
            } catch (err) { alert(err.message); }
        }

        auth.onAuthStateChanged(user => {
            if(user) {
                document.getElementById('view-auth').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                renderList();
            } else {
                document.getElementById('view-auth').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function renderList() {
            const q = document.getElementById('search').value.toLowerCase();
            const list = document.getElementById('client-list');
            list.innerHTML = accounts.filter(a => a.name.toLowerCase().includes(q)).map(a => `
                <div class="bg-white p-6 rounded-[2rem] shadow-sm flex justify-between border">
                    <div><b>${a.name}</b><br><small class="text-slate-400 font-bold uppercase">Acc: ${a.acc} | OTP: ${a.otp}</small></div>
                    <div class="text-blue-600 font-black text-2xl italic">₹${a.amt}</div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
