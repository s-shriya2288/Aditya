<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Banker Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #1e293b; }
        .hidden { display: none !important; }
        .admin-card { 
            background: white; 
            border-radius: 2rem; 
            padding: 2rem 2.5rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .admin-card:hover { transform: translateY(-2px); }
        .delete-btn { opacity: 0; transition: opacity 0.2s; }
        .admin-card:hover .delete-btn { opacity: 1; }
    </style>
</head>
<body>

    <div id="view-admin" class="min-h-screen p-10">
        <div class="flex justify-between items-center mb-12 max-w-[1400px] mx-auto">
            <h1 class="text-3xl font-black italic">Banker Console</h1>
            <button onclick="logout()" class="bg-slate-200 text-slate-600 px-6 py-2 rounded-xl font-bold text-xs uppercase tracking-widest">Exit</button>
        </div>

        <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
            
            <div class="lg:col-span-4 bg-white p-10 rounded-[3rem] shadow-sm h-fit">
                <p class="text-[10px] font-black text-slate-300 uppercase mb-8 tracking-widest">New RD Registration</p>
                <div class="space-y-4">
                    <input id="r-acc" placeholder="Account Number (Private)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none focus:ring-2 ring-blue-100">
                    <input id="r-name" placeholder="Full Name" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                    <input id="r-phone" placeholder="Phone (+91)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                    
                    <div class="flex gap-4">
                        <input id="r-denom" oninput="liveCalc()" type="number" placeholder="RD Denom (₹)" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                        <input id="r-years" oninput="liveCalc()" type="number" placeholder="Total Years" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                    </div>

                    <div class="flex gap-4">
                        <div class="w-1/2 p-4 bg-emerald-50 rounded-2xl flex items-center justify-between">
                            <span class="text-[10px] font-bold text-emerald-600">Rebate</span>
                            <input id="r-rebate" oninput="liveCalc()" type="number" value="0" class="bg-transparent text-right font-bold text-emerald-700 outline-none w-16">
                        </div>
                        <div class="w-1/2 p-4 bg-red-50 rounded-2xl flex items-center justify-between">
                            <span class="text-[10px] font-bold text-red-600">Fine</span>
                            <input id="r-fine" oninput="liveCalc()" type="number" value="0" class="bg-transparent text-right font-bold text-red-700 outline-none w-16">
                        </div>
                    </div>

                    <div class="bg-[#0f172a] p-8 rounded-[2.5rem] text-center text-white my-6">
                        <p class="text-[9px] opacity-40 uppercase tracking-widest mb-1">Total Collection</p>
                        <h2 id="total-text" class="text-4xl font-black italic">₹0</h2>
                    </div>

                    <button onclick="saveRD()" class="w-full bg-blue-600 text-white py-6 rounded-3xl font-bold text-lg shadow-xl shadow-blue-200">Create RD & Send OTP</button>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div id="admin-list" class="space-y-4">
                    </div>
            </div>

        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // LIVE CALCULATION
        function liveCalc() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            document.getElementById('total-text').innerText = "₹" + (d - r + f).toLocaleString();
        }

        // SAVE DATA
        async function saveRD() {
            const denom = parseFloat(document.getElementById('r-denom').value) || 0;
            const years = parseInt(document.getElementById('r-years').value) || 1;
            const rebate = parseFloat(document.getElementById('r-rebate').value) || 0;
            
            const data = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value.toUpperCase(),
                phone: document.getElementById('r-phone').value.replace(/\s/g, ''),
                denom: denom,
                years: years,
                balance: (denom - rebate),
                paid_count: 1,
                otp: Math.floor(1000 + Math.random() * 9000),
                created_at: new Date()
            };

            try {
                await db.collection('accounts').add(data);
                alert("Account Created Successfully!");
                location.reload();
            } catch (e) { alert("Error: " + e.message); }
        }

        // DELETE ACCOUNT
        async function deleteAcc(id) {
            if(confirm("Are you sure you want to delete this RD account? This cannot be undone.")) {
                await db.collection('accounts').doc(id).delete();
            }
        }

        // LOAD LIST (Full Width Layout)
        function loadAdminList() {
            db.collection('accounts').orderBy('created_at', 'desc').onSnapshot(snap => {
                const list = document.getElementById('admin-list');
                list.innerHTML = '';
                
                snap.forEach(doc => {
                    const d = doc.data();
                    const id = doc.id;
                    
                    list.innerHTML += `
                    <div class="admin-card">
                        <div class="flex items-center gap-6">
                            <button onclick="deleteAcc('${id}')" class="delete-btn text-red-400 hover:text-red-600 p-2">
                                🗑️
                            </button>
                            <div>
                                <h3 class="text-xl font-black text-slate-800 tracking-tight">${d.name}</h3>
                                <p class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">
                                    ACC: ${d.acc} | OTP: ${d.otp}
                                </p>
                            </div>
                        </div>
                        
                        <div class="text-right">
                            <h2 class="text-3xl font-black text-blue-600 italic tracking-tighter">₹${d.balance.toLocaleString()}</h2>
                            <div class="flex items-center justify-end mt-1">
                                <div class="bg-blue-50 text-blue-600 text-[9px] font-black px-3 py-1 rounded-full">
                                    ${d.paid_count}/${d.years * 12} INSTALMENTS
                                </div>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        // Initialize
        loadAdminList();
    </script>
</body>
</html>
