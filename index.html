<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Enterprise Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; color: #0f172a; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        input { background: #f8fafc; border: 2px solid #e2e8f0; border-radius: 0.75rem; padding: 1rem; width: 100%; font-weight: 600; transition: all 0.2s; }
        input:focus { border-color: #2563eb; outline: none; background: white; }
        .btn-primary { background: #2563eb; color: white; padding: 1.25rem; border-radius: 1rem; font-weight: 800; width: 100%; transition: transform 0.1s; }
        .btn-primary:active { transform: scale(0.98); }
        .pay-mode { border: 2px solid #e2e8f0; border-radius: 1rem; padding: 1rem; cursor: pointer; font-weight: 800; text-align: center; }
        .pay-mode.active { border-color: #2563eb; background: #eff6ff; color: #2563eb; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6">
        <div class="glass-card p-10 w-full max-w-[400px] text-center">
            <h1 class="text-2xl font-black italic mb-8 text-blue-900">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="showSecurity('view-admin')" class="btn-primary bg-slate-900">Banker Console</button>
                <button onclick="showSecurity('view-worker')" class="btn-primary bg-emerald-700">Worker Terminal</button>
                <button onclick="nav('view-client-login')" class="btn-primary">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-security" class="hidden min-h-screen flex items-center justify-center p-6 bg-slate-100">
        <div class="glass-card p-10 w-full max-w-[360px] text-center">
            <p class="text-[10px] font-black tracking-widest uppercase mb-4 opacity-40">Security Verification</p>
            <input id="sec-pass" type="password" placeholder="••••" class="text-center text-3xl tracking-widest mb-6">
            <button onclick="verifyAccess()" class="btn-primary">Enter System</button>
            <button onclick="nav('view-hub')" class="mt-4 text-xs font-bold text-slate-400">Cancel</button>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-6">
        <div class="max-w-6xl mx-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-2xl font-black italic">Banker Console</h2>
                <button onclick="nav('view-hub')" class="bg-red-50 text-red-600 px-6 py-2 rounded-full font-bold text-sm">EXIT TERMINAL</button>
            </div>
            <div class="grid lg:grid-cols-12 gap-8">
                <div class="lg:col-span-4 glass-card p-6 space-y-4 h-fit">
                    <p id="admin-mode" class="text-[10px] font-black text-blue-600 uppercase">Create Account</p>
                    <input id="r-acc" placeholder="Account Number">
                    <input id="r-name" placeholder="Full Name">
                    <input id="r-phone" placeholder="Mobile Number">
                    <div class="grid grid-cols-2 gap-4">
                        <input id="r-denom" type="number" placeholder="Denom" oninput="liveTotal()">
                        <input id="r-years" type="number" placeholder="Years">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div><label class="text-[9px] font-bold text-red-500">FINE (+)</label><input id="r-fine" type="number" value="0" oninput="liveTotal()"></div>
                        <div><label class="text-[9px] font-bold text-emerald-500">REBATE (-)</label><input id="r-rebate" type="number" value="0" oninput="liveTotal()"></div>
                    </div>
                    <div class="bg-slate-900 text-white p-4 rounded-xl text-center">
                        <h3 id="r-total" class="text-2xl font-black">₹0</h3>
                    </div>
                    <input type="hidden" id="edit-id">
                    <button id="save-btn" onclick="saveAccount()" class="btn-primary">Register Member</button>
                    <button id="cancel-edit" onclick="resetForm()" class="hidden w-full text-slate-400 py-2 font-bold">Cancel Edit</button>
                </div>
                <div class="lg:col-span-8 space-y-3" id="admin-list"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen flex items-center justify-center p-6 bg-emerald-50">
        <div class="glass-card p-8 w-full max-w-[440px]">
            <div id="w-step-1" class="space-y-6">
                <div class="flex justify-between items-center"><h3 class="font-black italic">Collection Desk</h3><button onclick="nav('view-hub')" class="text-xs font-bold">EXIT</button></div>
                <input id="w-find" placeholder="Enter Mobile Number" class="text-center text-xl">
                <button onclick="workerFind()" class="btn-primary bg-emerald-600">Search Member</button>
            </div>
            <div id="w-step-2" class="hidden space-y-6">
                <h2 id="w-display-name" class="text-xl font-black text-center italic">---</h2>
                <div class="bg-slate-50 p-6 rounded-2xl border-2 border-dashed border-slate-200">
                    <div class="flex justify-between font-bold text-sm"><span>Payable:</span><span id="w-display-amt" class="text-blue-600">₹0</span></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div id="p-cash" class="pay-mode active" onclick="setMode('CASH')">CASH</div>
                    <div id="p-qr" class="pay-mode" onclick="setMode('QR CODE')">QR CODE</div>
                </div>
                <button onclick="workerSendOTP()" class="btn-primary bg-slate-900">Send Verification OTP</button>
            </div>
            <div id="w-step-3" class="hidden space-y-4">
                <input id="w-otp" placeholder="••••" class="text-center text-4xl tracking-widest">
                <button onclick="workerFinalize()" class="btn-primary bg-emerald-600">Complete Deposit</button>
            </div>
        </div>
    </div>

    <div id="view-client-login" class="hidden min-h-screen flex items-center justify-center p-6 bg-blue-50">
        <div class="glass-card p-10 w-full max-w-[400px] text-center">
            <h2 class="text-xl font-black italic mb-6">Passbook Access</h2>
            <div id="cl-s1" class="space-y-4">
                <input id="cl-phone" placeholder="Mobile Number">
                <button onclick="clientOTP()" class="btn-primary">Get Access OTP</button>
                <button onclick="nav('view-hub')" class="w-full text-slate-400 font-bold text-xs">Back</button>
            </div>
            <div id="cl-s2" class="hidden space-y-4">
                <input id="cl-otp" placeholder="••••" class="text-center text-4xl tracking-widest">
                <button onclick="clientLogin()" class="btn-primary bg-slate-900">Verify & Login</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = { apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas", projectId: "bank-d463e", appId: "1:293213633601:web:848fa363878f3230345ac0" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let targetView, activeDoc, activeData, generatedOTP, currentMode = 'CASH';

        function nav(id) {
            document.querySelectorAll('body > div').forEach(d => d.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
            if(id === 'view-admin') loadAdmin();
        }

        // --- SECURITY ---
        function showSecurity(target) { targetView = target; nav('view-security'); }
        function verifyAccess() {
            if(document.getElementById('sec-pass').value === '1234') {
                document.getElementById('sec-pass').value = '';
                nav(targetView);
            } else { alert("Unauthorized"); }
        }

        // --- BANKER CORE ---
        function liveTotal() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            document.getElementById('r-total').innerText = "₹" + (d + f - r).toLocaleString();
        }

        async function saveAccount() {
            const id = document.getElementById('edit-id').value;
            const payload = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value.toUpperCase(),
                phone: document.getElementById('r-phone').value,
                denom: parseFloat(document.getElementById('r-denom').value) || 0,
                fine: parseFloat(document.getElementById('r-fine').value) || 0,
                rebate: parseFloat(document.getElementById('r-rebate').value) || 0,
                years: parseInt(document.getElementById('r-years').value) || 1
            };

            try {
                if(id) {
                    await db.collection('accounts').doc(id).update(payload);
                    alert("Account Updated Successfully!");
                } else {
                    payload.balance = 0; payload.paid_count = 0; payload.created_at = new Date();
                    await db.collection('accounts').add(payload);
                    alert("New Account Registered!");
                }
                resetForm(); loadAdmin();
            } catch(e) { alert("Error saving: " + e.message); }
        }

        function editMode(id, data) {
            document.getElementById('edit-id').value = id;
            document.getElementById('admin-mode').innerText = "Edit Account";
            document.getElementById('save-btn').innerText = "Update Member";
            document.getElementById('cancel-edit').classList.remove('hidden');
            document.getElementById('r-acc').value = data.acc;
            document.getElementById('r-name').value = data.name;
            document.getElementById('r-phone').value = data.phone;
            document.getElementById('r-denom').value = data.denom;
            document.getElementById('r-fine').value = data.fine;
            document.getElementById('r-rebate').value = data.rebate;
            document.getElementById('r-years').value = data.years;
            liveTotal();
        }

        async function delAcc(id) { if(confirm("Permanently delete this member?")) { await db.collection('accounts').doc(id).delete(); loadAdmin(); } }

        function resetForm() {
            document.getElementById('edit-id').value = '';
            document.getElementById('admin-mode').innerText = "Create Account";
            document.getElementById('save-btn').innerText = "Register Member";
            document.getElementById('cancel-edit').classList.add('hidden');
            ['r-acc','r-name','r-phone','r-denom','r-years','r-fine','r-rebate'].forEach(i => document.getElementById(i).value = (i.includes('r-fine')||i.includes('r-rebate')?0:''));
            liveTotal();
        }

        function loadAdmin() {
            db.collection('accounts').orderBy('created_at','desc').get().then(snap => {
                const list = document.getElementById('admin-list'); list.innerHTML = '';
                snap.forEach(doc => {
                    const d = doc.data();
                    list.innerHTML += `<div class="glass-card p-6 flex justify-between items-center">
                        <div><h4 class="font-bold italic">${d.name}</h4><p class="text-[10px] opacity-50">${d.acc} • ${d.phone}</p></div>
                        <div class="flex items-center gap-6">
                            <span class="text-lg font-black italic">₹${(d.balance || 0).toLocaleString()}</span>
                            <div class="flex gap-2">
                                <button onclick='editMode("${doc.id}", ${JSON.stringify(d)})' class="text-blue-600 font-bold text-[10px]">EDIT</button>
                                <button onclick='delAcc("${doc.id}")' class="text-red-400 font-bold text-[10px]">DEL</button>
                            </div>
                        </div>
                    </div>`;
                });
            });
        }

        // --- WORKER CORE ---
        async function workerFind() {
            const snap = await db.collection('accounts').where('phone','==',document.getElementById('w-find').value).get();
            if(!snap.empty) {
                activeDoc = snap.docs[0].id; activeData = snap.docs[0].data();
                document.getElementById('w-display-name').innerText = activeData.name;
                window.payableAmt = (activeData.denom + (activeData.fine || 0) - (activeData.rebate || 0));
                document.getElementById('w-display-amt').innerText = "₹" + window.payableAmt.toLocaleString();
                document.getElementById('w-step-1').classList.add('hidden');
                document.getElementById('w-step-2').classList.remove('hidden');
            } else { alert("Member Not Found"); }
        }

        function setMode(m) { 
            currentMode = m; 
            document.getElementById('p-cash').className = `pay-mode ${m==='CASH'?'active':''}`;
            document.getElementById('p-qr').className = `pay-mode ${m==='QR CODE'?'active':''}`;
        }

        function workerSendOTP() {
            generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
            alert(`[SMS Simulation] To: ${activeData.phone}\nMode: ${currentMode}\nVerification Code: ${generatedOTP}`);
            document.getElementById('w-step-2').classList.add('hidden');
            document.getElementById('w-step-3').classList.remove('hidden');
        }

        async function workerFinalize() {
            if(document.getElementById('w-otp').value === generatedOTP) {
                await db.collection('accounts').doc(activeDoc).update({
                    balance: firebase.firestore.FieldValue.increment(window.payableAmt),
                    paid_count: firebase.firestore.FieldValue.increment(1)
                });
                alert("Deposit Recorded Successfully!");
                location.reload();
            } else { alert("Wrong OTP"); }
        }

        // --- CLIENT CORE ---
        async function clientOTP() {
            const snap = await db.collection('accounts').where('phone','==',document.getElementById('cl-phone').value).get();
            if(!snap.empty) {
                activeData = snap.docs[0].data();
                generatedOTP = Math.floor(1000 + Math.random() * 9000).toString();
                alert("Client Access OTP: " + generatedOTP);
                document.getElementById('cl-s1').classList.add('hidden');
                document.getElementById('cl-s2').classList.remove('hidden');
            }
        }
        // ... (remaining client login logic same as previous)
    </script>
</body>
</html>
