<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | RD Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f1f5f9; }
        .glass-card { background: white; border-radius: 2.5rem; box-shadow: 0 20px 50px rgba(0,0,0,0.04); }
        .hidden { display: none !important; }
        input, select { transition: all 0.2s; }
        input:focus { ring: 2px; ring-color: #3b82f6; }
    </style>
</head>
<body>

    <div id="view-selector" class="min-h-screen flex items-center justify-center p-6 bg-[#f8fafc]">
        <div class="bg-white p-12 rounded-[3.5rem] shadow-2xl w-full max-w-md text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-1">SecureBank India</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-[0.2em] mb-12">RD Control Terminal</p>
            <div class="space-y-5">
                <button onclick="showGate('admin')" class="w-full bg-[#0f172a] text-white py-6 rounded-2xl font-black shadow-xl hover:scale-105 transition">Admin (Banker)</button>
                <button onclick="showGate('worker')" class="w-full bg-[#3d7a5d] text-white py-6 rounded-2xl font-black shadow-xl hover:scale-105 transition text-lg">Worker (Field)</button>
                <button onclick="showGate('client')" class="w-full bg-[#3b82f6] text-white py-6 rounded-2xl font-black shadow-xl hover:scale-105 transition">Client (Passbook)</button>
            </div>
        </div>
    </div>

    <div id="view-gate" class="hidden min-h-screen flex items-center justify-center p-4 bg-slate-200">
        <div class="bg-white p-10 rounded-[3rem] w-full max-w-md shadow-2xl relative">
            <h2 id="gate-title" class="text-2xl font-black mb-8 text-slate-800 italic uppercase">GATE</h2>
            
            <div id="box-email" class="space-y-4 hidden">
                <input id="email" type="email" placeholder="Staff Email" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                <input id="pass" type="password" placeholder="Password" class="w-full p-5 bg-slate-50 rounded-2xl outline-none border border-slate-100">
                <button onclick="authEmail()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-lg">Unlock System</button>
                <button id="reg-link" onclick="authEmail(true)" class="w-full text-blue-500 font-bold text-xs uppercase tracking-widest mt-4">Register New Admin</button>
            </div>

            <div id="box-phone" class="space-y-4 hidden">
                <input id="phone" type="text" placeholder="+91 00000 00000" class="w-full p-5 bg-slate-50 rounded-2xl outline-none">
                <div id="recaptcha-container" class="my-4"></div>
                <button id="btn-otp" onclick="sendOTP()" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-black">Send OTP</button>
                <input id="otp-code" type="text" placeholder="6-digit Code" class="hidden w-full p-5 bg-slate-50 rounded-2xl outline-none mt-4">
                <button id="btn-verify" onclick="verifyOTP()" class="hidden w-full bg-emerald-600 text-white py-5 rounded-2xl font-black mt-2">Verify & Enter</button>
            </div>
            <button onclick="location.reload()" class="w-full mt-8 text-[10px] font-black text-slate-300 uppercase tracking-widest">Back</button>
        </div>
    </div>

    <div id="view-admin" class="hidden min-h-screen p-8">
        <div class="max-w-[1400px] mx-auto grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4 glass-card p-10 h-fit">
                <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-10">New RD Registration</h3>
                <div class="space-y-4">
                    <input id="r-acc" placeholder="Account Number (Private)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
                    <input id="r-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
                    <input id="r-phone" placeholder="Phone (+91)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
                    <input id="r-denom" oninput="calcTotal()" type="number" placeholder="RD Denomination (₹)" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none">
                    <select id="r-years" class="w-full p-4 bg-slate-50 rounded-xl outline-none border-none appearance-none font-semibold text-slate-400">
                        <option value="1">1 Year</option><option value="2">2 Years</option><option value="5">5 Years</option>
                    </select>
                    <div class="flex gap-4">
                        <input id="r-rebate" oninput="calcTotal()" placeholder="Rebate (₹)" class="w-1/2 p-4 bg-emerald-50 text-emerald-600 rounded-xl outline-none border-none">
                        <input id="r-fine" oninput="calcTotal()" placeholder="Fine (₹)" class="w-1/2 p-4 bg-red-50 text-red-600 rounded-xl outline-none border-none">
                    </div>
                    <div class="bg-[#0f172a] p-8 rounded-[2rem] text-center text-white mt-4">
                        <p class="text-[10px] opacity-40 uppercase tracking-widest mb-1">Total Collection</p>
                        <h2 id="live-total" class="text-4xl font-black italic">₹0</h2>
                    </div>
                    <button onclick="createRD()" class="w-full bg-blue-600 text-white py-6 rounded-[1.5rem] font-black shadow-2xl hover:bg-blue-700 transition">Create RD & Send OTP</button>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="flex justify-between items-center px-4 mb-8">
                    <h2 class="text-3xl font-black text-slate-800 italic">Banker Console</h2>
                    <button onclick="logout()" class="bg-white px-6 py-2 rounded-full text-[10px] font-black uppercase text-slate-400 border hover:text-red-500 transition">Exit</button>
                </div>
                <div id="admin-list" class="space-y-4"></div>
            </div>
        </div>
    </div>

    <div id="view-worker" class="hidden min-h-screen bg-[#f0f9f4] p-8">
        <div class="max-w-md mx-auto">
            <h2 class="text-center font-black italic text-emerald-900 mb-12 text-3xl">Field Terminal</h2>
            <div id="worker-list" class="space-y-8"></div>
            <button onclick="logout()" class="w-full mt-12 text-emerald-600 font-bold opacity-30 uppercase text-xs tracking-widest">Logout Terminal</button>
        </div>
    </div>

    <div id="view-client" class="hidden min-h-screen p-6 max-w-md mx-auto">
        <div class="bg-gradient-to-br from-blue-600 to-indigo-900 text-white p-10 rounded-[3.5rem] shadow-2xl mb-10">
            <h2 id="c-name" class="text-xl font-bold mb-1 uppercase tracking-tight">---</h2>
            <p id="c-balance" class="text-6xl font-black italic mb-10">₹0.00</p>
            <div class="grid grid-cols-2 gap-6 text-[10px] font-black opacity-50 uppercase tracking-widest">
                <div><p>Status</p><p id="c-status" class="text-sm opacity-100">ACTIVE</p></div>
                <div><p>Account ID</p><p id="c-acc" class="text-sm opacity-100">---</p></div>
            </div>
        </div>
        <button onclick="logout()" class="w-full py-5 text-slate-400 font-black uppercase text-[10px] tracking-[0.3em]">Close Passbook</button>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            storageBucket: "bank-d463e.firebasestorage.app",
            messagingSenderId: "293213633601",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        let targetRole = '';
        let confirmOTP;

        function showGate(role) {
            targetRole = role;
            document.getElementById('view-selector').classList.add('hidden');
            document.getElementById('view-gate').classList.remove('hidden');
            if(role === 'client') {
                document.getElementById('box-phone').classList.remove('hidden');
                document.getElementById('box-email').classList.add('hidden');
            } else {
                document.getElementById('box-email').classList.remove('hidden');
                document.getElementById('box-phone').classList.add('hidden');
                document.getElementById('reg-link').classList.toggle('hidden', role !== 'admin');
            }
        }

        async function authEmail(isReg = false) {
            const e = document.getElementById('email').value;
            const p = document.getElementById('pass').value;
            try {
                if(isReg) {
                    const res = await auth.createUserWithEmailAndPassword(e, p);
                    await db.collection('users').doc(res.user.uid).set({ role: 'admin' });
                } else {
                    const res = await auth.signInWithEmailAndPassword(e, p);
                    const doc = await db.collection('users').doc(res.user.uid).get();
                    if(doc.data().role !== targetRole) { alert("Access Denied for this portal!"); logout(); }
                }
            } catch (err) { alert(err.message); }
        }

        function sendOTP() {
            const num = document.getElementById('phone').value;
            const appVerifier = new firebase.auth.RecaptchaVerifier('recaptcha-container');
            auth.signInWithPhoneNumber(num, appVerifier).then(res => {
                confirmOTP = res;
                document.getElementById('otp-code').classList.remove('hidden');
                document.getElementById('btn-verify').classList.remove('hidden');
                document.getElementById('btn-otp').classList.add('hidden');
            }).catch(e => alert(e.message));
        }

        function verifyOTP() {
            confirmOTP.confirm(document.getElementById('otp-code').value).catch(e => alert("Invalid OTP Code"));
        }

        auth.onAuthStateChanged(async user => {
            document.querySelectorAll('[id^="view-"]').forEach(v => v.classList.add('hidden'));
            if(user) {
                const doc = await db.collection('users').doc(user.uid).get();
                const role = doc.exists ? doc.data().role : 'client';
                if(role === 'admin') { document.getElementById('view-admin').classList.remove('hidden'); loadAdmin(); }
                else if(role === 'worker') { document.getElementById('view-worker').classList.remove('hidden'); loadWorker(); }
                else { document.getElementById('view-client').classList.remove('hidden'); loadClient(user.phoneNumber); }
            } else { document.getElementById('view-selector').classList.remove('hidden'); }
        });

        function calcTotal() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            document.getElementById('live-total').innerText = "₹" + (d - r + f).toLocaleString();
        }

        async function createRD() {
            const d = parseFloat(document.getElementById('r-denom').value) || 0;
            const r = parseFloat(document.getElementById('r-rebate').value) || 0;
            const f = parseFloat(document.getElementById('r-fine').value) || 0;
            
            const data = {
                acc: document.getElementById('r-acc').value,
                name: document.getElementById('r-name').value,
                phone: document.getElementById('r-phone').value,
                denom: d,
                years: document.getElementById('r-years').value,
                balance: (d - r + f),
                otp: Math.floor(1000 + Math.random() * 9000),
                date: new Date()
            };

            if(!data.acc || !data.name || !data.phone || d === 0) return alert("All fields are required!");
            await db.collection('accounts').add(data);
            alert("RD Saved Successfully!");
            document.querySelectorAll('input').forEach(i => i.value = '');
            calcTotal();
        }

        function loadAdmin() {
            db.collection('accounts').orderBy('date', 'desc').onSnapshot(snap => {
                document.getElementById('admin-list').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                    <div class="bg-white p-8 rounded-[2.5rem] shadow-sm flex justify-between items-center border border-slate-50">
                        <div><p class="font-black uppercase text-slate-800 text-lg">${d.name}</p><p class="text-[10px] text-slate-400 font-bold">ACC: ${d.acc} | OTP: ${d.otp}</p></div>
                        <div class="text-right"><h2 class="text-3xl font-black text-blue-700 italic">₹${d.balance.toLocaleString()}</h2><p class="text-[8px] bg-blue-50 text-blue-500 px-3 py-1 rounded-full font-black uppercase inline-block">0/${d.years} Years</p></div>
                    </div>`;
                }).join('');
            });
        }

        function loadWorker() {
            db.collection('accounts').onSnapshot(snap => {
                document.getElementById('worker-list').innerHTML = snap.docs.map(doc => {
                    const d = doc.data();
                    return `
                    <div class="bg-white p-10 rounded-[3.5rem] shadow-xl text-center border-t-[12px] border-emerald-500">
                        <h4 class="text-2xl font-black text-slate-800 mb-6 uppercase tracking-tight">${d.name}</h4>
                        <div class="bg-emerald-50 p-8 rounded-[2rem] mb-8">
                            <p class="text-[10px] text-emerald-600 font-black mb-1 uppercase tracking-[0.2em]">Total to Collect</p>
                            <h2 class="text-4xl font-black text-emerald-800 italic">₹${d.balance.toLocaleString()}</h2>
                        </div>
                        <button class="w-full bg-[#3d7a5d] text-white py-6 rounded-2xl font-black shadow-lg text-lg">Generate QR</button>
                    </div>`;
                }).join('');
            });
        }

        function loadClient(phone) {
            db.collection('accounts').where('phone', '==', phone).onSnapshot(snap => {
                if(!snap.empty) {
                    const d = snap.docs[0].data();
                    document.getElementById('c-name').innerText = d.name;
                    document.getElementById('c-balance').innerText = "₹" + d.balance.toLocaleString();
                    document.getElementById('c-acc').innerText = d.acc;
                }
            });
        }

        function logout() { auth.signOut().then(() => location.reload()); }
    </script>
</body>
</html>
