<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureBank India | Terminal & Passbook</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; }
        .hidden { display: none !important; }
        .glass-card { background: white; border-radius: 2.5rem; border: 1px solid #f1f5f9; box-shadow: 0 20px 50px rgba(0,0,0,0.02); }
        
        /* Client Passbook Visuals (SHRIYA Design) */
        .passbook-card { 
            background: linear-gradient(135deg, #2563eb 0%, #1e3a8a 100%); 
            border-radius: 2.5rem; color: white; padding: 2.5rem; width: 100%; max-width: 450px; 
            box-shadow: 0 30px 60px -12px rgba(37, 99, 235, 0.4); 
        }
        .receipt-paper { background: white; width: 100%; max-width: 380px; padding: 40px; border-radius: 24px; color: black; text-align: center; }
        
        input { background: #f1f5f9; border-radius: 1rem; padding: 1.1rem; outline: none; width: 100%; font-weight: 600; border: 2px solid transparent; }
        input:focus { border-color: #3b82f6; background: white; }
    </style>
</head>
<body>

    <div id="view-hub" class="min-h-screen flex items-center justify-center p-6 bg-slate-50">
        <div class="glass-card p-12 w-full max-w-[440px] text-center">
            <h1 class="text-3xl font-black text-blue-900 italic mb-10 tracking-tighter">SecureBank India</h1>
            <div class="space-y-4">
                <button onclick="nav('view-admin')" class="w-full bg-[#0f172a] text-white py-5 rounded-2xl font-bold">Banker Console</button>
                <button onclick="nav('view-worker')" class="w-full bg-emerald-700 text-white py-5 rounded-2xl font-bold">Worker Terminal</button>
                <button onclick="nav('view-client-login')" class="w-full bg-blue-600 text-white py-5 rounded-2xl font-bold">Client Passbook</button>
            </div>
        </div>
    </div>

    <div id="view-client-login" class="hidden min-h-screen flex flex-col items-center justify-center p-6 bg-blue-50">
        <div class="glass-card p-10 w-full max-w-[400px] text-center">
            <h2 class="text-2xl font-black mb-8 italic">Passbook Access</h2>
            <div id="c-step-1" class="space-y-4">
                <input id="c-login-phone" placeholder="Registered Mobile">
                <button onclick="clientSendOTP()" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold">Get Access OTP</button>
            </div>
            <div id="c-step-2" class="hidden space-y-4">
                <input id="c-otp" placeholder="••••" class="text-center text-4xl tracking-widest">
                <button onclick="verifyClientLogin()" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold">Enter Ledger</button>
            </div>
        </div>
    </div>

    <div id="view-passbook" class="hidden min-h-screen flex flex-col items-center p-8 bg-white">
        <p class="text-[10px] font-black text-slate-300 tracking-[0.4em] uppercase mb-8">Secure Digital Ledger</p>
        
        <div class="passbook-card mb-8">
            <p id="p-name" class="text-lg font-bold opacity-70 mb-1 uppercase">---</p>
            <h1 id="p-balance" class="text-4xl font-black italic">₹0</h1>
            <div class="mt-10 pt-5 border-t border-white/10 flex justify-between text-[9px] font-black opacity-40">
                <span>AUTHENTICATED</span>
                <span id="p-acc">ACC: ****</span>
            </div>
        </div>

        <div class="w-full max-w-[450px] space-y-4">
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-6 text-center">
                    <label class="text-[9px] font-bold text-slate-400 block mb-1">DENOM</label>
                    <p id="p-denom" class="text-xl font-black">₹0</p>
                </div>
                <div class="glass-card p-6 text-center">
                    <label class="text-[9px] font-bold text-slate-400 block mb-1">PAID MONTHS</label>
                    <p id="p-paid" class="text-xl font-black">0/12</p>
                </div>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="glass-card p-6 text-center">
                    <label class="text-[9px] font-bold text-emerald-500 block mb-1">REBATE</label>
                    <p id="p-rebate" class="text-xl font-black">₹0</p>
                </div>
                <div class="glass-card p-6 text-center">
                    <label class="text-[9px] font-bold text-red-500 block mb-1">FINE</label>
                    <p id="p-fine" class="text-xl font-black">₹0</p>
                </div>
            </div>

            <button onclick="showReceipt()" class="w-full bg-slate-900 text-white py-5 rounded-3xl font-black shadow-xl">
                Download Latest Receipt (PDF)
            </button>
        </div>
    </div>

    <div id="receipt-modal" class="fixed inset-0 hidden z-50 flex items-center justify-center p-6 bg-slate-900/90 backdrop-blur-md">
        <div id="receipt-area" class="receipt-paper">
            <h2 class="text-2xl font-black text-blue-900 italic uppercase">SecureBank India</h2>
            <p class="text-[9px] font-bold text-slate-400 tracking-widest mb-6">OFFICIAL PAYMENT RECEIPT</p>
            
            <div class="border-y border-dashed py-6 space-y-3 text-sm font-bold">
                <div class="flex justify-between"><span>Member:</span><span id="rec-name">---</span></div>
                <div class="flex justify-between"><span>Paid Amount:</span><span id="rec-amount">₹0</span></div>
                <div class="flex justify-between"><span>Status:</span><span class="text-emerald-600">SUCCESSFUL</span></div>
                <div class="flex justify-between"><span>Date:</span><span id="rec-date">---</span></div>
            </div>
            
            <div class="mt-6 bg-blue-50 p-4 rounded-xl">
                <p class="text-[9px] font-bold text-blue-800">NEXT DUE DATE</p>
                <p class="text-lg font-black text-blue-900">07/04/2026</p>
            </div>
        </div>
        <div class="fixed bottom-10 flex gap-4">
            <button onclick="downloadPDF()" class="bg-blue-600 text-white px-8 py-4 rounded-2xl font-black">Save to Device</button>
            <button onclick="nav('view-passbook')" class="bg-white text-black px-8 py-4 rounded-2xl font-black">Close</button>
        </div>
    </div>

    <div id="view-admin" class="hidden p-8">... Banker Console Logic ...</div>
    <div id="view-worker" class="hidden p-8">... Worker Terminal Logic ...</div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCLZr_vHKRZw9mr27IFzkKvB6SD4Keksas",
            authDomain: "bank-d463e.firebaseapp.com",
            projectId: "bank-d463e",
            appId: "1:293213633601:web:848fa363878f3230345ac0"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        let currentClient, activeOTP;

        function nav(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        // --- CLIENT SIDE LOGIC ---
        async function clientSendOTP() {
            const phone = document.getElementById('c-login-phone').value;
            const snap = await db.collection('accounts').where('phone', '==', phone).get();
            if(!snap.empty) {
                currentClient = snap.docs[0].data();
                activeOTP = Math.floor(1000 + Math.random() * 9000).toString();
                alert("CLIENT ACCESS OTP: " + activeOTP); // In reality, this is SMS
                document.getElementById('c-step-1').classList.add('hidden');
                document.getElementById('c-step-2').classList.remove('hidden');
            } else { alert("Mobile not found."); }
        }

        function verifyClientLogin() {
            if(document.getElementById('c-otp').value === activeOTP) {
                renderClientData();
                nav('view-passbook');
            } else { alert("Wrong OTP"); }
        }

        function renderClientData() {
            document.getElementById('p-name').innerText = currentClient.name;
            document.getElementById('p-balance').innerText = "₹" + (currentClient.balance || 0).toLocaleString('en-IN');
            document.getElementById('p-denom').innerText = "₹" + (currentClient.denom || 0).toLocaleString('en-IN');
            document.getElementById('p-paid').innerText = `${currentClient.paid_count || 0}/12`;
            document.getElementById('p-fine').innerText = "₹" + (currentClient.fine || 0).toLocaleString('en-IN');
            document.getElementById('p-rebate').innerText = "₹" + (currentClient.rebate || 0).toLocaleString('en-IN');
            document.getElementById('p-acc').innerText = "ACC: " + currentClient.acc;
        }

        function showReceipt() {
            document.getElementById('rec-name').innerText = currentClient.name;
            document.getElementById('rec-amount').innerText = "₹" + currentClient.denom.toLocaleString('en-IN');
            document.getElementById('rec-date').innerText = new Date().toLocaleDateString('en-GB');
            document.getElementById('receipt-modal').classList.remove('hidden');
        }

        async function downloadPDF() {
            const canvas = await html2canvas(document.getElementById('receipt-area'), { scale: 3 });
            const { jsPDF } = window.jspdf;
            const pdf = new jsPDF('p', 'mm', 'a4');
            pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 10, 10, 100, 120);
            pdf.save(`${currentClient.name}_Receipt.pdf`);
        }
    </script>
</body>
</html>
